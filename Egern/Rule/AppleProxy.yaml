# 规则名称: AppleProxy
# 链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AppleProxy.yaml
# 优化时间: 2026.04.0

domain_set:
  # --- Apple News (严格锁区服务) ---
  - news-assets.apple.com
  - news-client.apple.com
  - news-edge.apple.com
  - news-events.apple.com
  - apple.comscoreresearch.com

  # --- Apple TV & Apple Music (外区流媒体体验优化) ---
  - tv.apple.com
  - tv.applemusic.com
  - music.apple.com
  - js-cdn.music.apple.com
  - books.itunes.apple.com
  - hls-svod.itunes.apple.com
  - play-edge.itunes.apple.com
  - np-edge.itunes.apple.com
  - uts-api.itunes.apple.com

  # --- App Store / iTunes 核心 API (注：不包含实际 App 的 CDN 下载流) ---
  - itunes.apple.com
  - apps.apple.com
  - sandbox.itunes.apple.com
  - lookup-api.apple.com

  # --- 开发者服务 (加速文档与 WWDC 视频) ---
  - developer.apple.com
  - devimages-cdn.apple.com
  - devstreaming-cdn.apple.com
  - docs-assets.developer.apple.com
  - appstoreconnect.apple.com
  - itunesconnect.apple.com

  # --- TestFlight 外区回退支持 ---
  - testflight.apple.com
  - api.testflight.apple.com

  # --- iCloud 隐私代理 (Private Relay) ---
  - mask.icloud.com
  - mask-api.icloud.com
  - mask-h2.icloud.com
  
  # --- 其他 API 边缘节点 ---
  - api-glb-sea.smoot.apple.com
  - gspe1-ssl.ls.apple.com

domain_suffix_set:
  # --- 核心外区后缀 ---
  - apple.news
  - appsto.re
  - apple.co
  - apple-mapkit.com
  - organicfruitapps.com

domain_keyword_set:
  - apple.com.edgekey.net
  - itunes.apple.com.edgekey.net
