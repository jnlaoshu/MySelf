#!author=AI, ddgksf2013
#!homepage=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/TravelAdBlock.yaml

[Rule]
# в”Җв”Җ ж»ҙж»ҙеҮәиЎҢ в”Җв”Җ
DOMAIN,gts.diditaxi.com.cn,REJECT
DOMAIN,xflow.didistatic.com,REJECT
DOMAIN,adx.xiaojukeji.com,REJECT

# в”Җв”Җ й“Ғи·Ҝ 12306 в”Җв”Җ
DOMAIN,ad.12306.cn,REJECT

# в”Җв”Җ жҗәзЁӢж—…иЎҢ в”Җв”Җ
DOMAIN,ad.ctrip.com,REJECT

# в”Җв”Җ е“Ҳе•°еҮәиЎҢ в”Җв”Җ
DOMAIN,ad.hellobike.com,REJECT

[Rewrite]
# в”Җв”Җ е“Ҳе•°еҮәиЎҢйқҷжҖҒе№ҝе‘ҠжӢҰжҲӘ в”Җв”Җ
^https?:\/\/image\.hellobike\.com\/images\/ad_.* reject

# в”Җв”Җ ж»ҙж»ҙеҮәиЎҢ (JQ е“Қеә”дҪ“зІҫз®Җ) в”Җв”Җ
http-response-jq ^https?:\/\/api\.didiglobal\.com\/gulfstream\/passenger\/v2\/core\/experience 'del(.data.cards[]? | select(.type == "operation" or .type == "marketing" or .type == "banner"))'

# в”Җв”Җ й“Ғи·Ҝ 12306 (JQ е“Қеә”дҪ“зІҫз®Җ) в”Җв”Җ
http-response-jq ^https?:\/\/mobile\.12306\.cn\/otsmobile\/app\/mgs\/mgw\.htm 'del(.materialsList, .advertParam, .appDynamicParam)'

# в”Җв”Җ жҗәзЁӢж—…иЎҢ (JQ е“Қеә”дҪ“зІҫз®Җ) в”Җв”Җ
http-response-jq ^https?:\/\/m\.ctrip\.com\/restapi\/soa2\/16709\/json\/getHomePageData 'del(.data.PromotionList, .data.BannerList, .data.FloatWindow)'

# в”Җв”Җ е“Ҳе•°еҮәиЎҢ (JQ е“Қеә”дҪ“зІҫз®Җ) в”Җв”Җ
http-response-jq ^https?:\/\/api\.hellobike\.com\/api\.boss\.boss\.AppHomeBoss\/getHomeBoss 'if .data and .data.homeCardVos then .data.homeCardVos |= map(select(.cardType != "marketing" and .cardType != "operation" and .cardType != "banner")) else . end'
http-response-jq ^https?:\/\/api\.hellobike\.com\/api\.vehicle\.bike\.bikeHome\/getConfig 'del(.data.banner, .data.floatLayer, .data.popWindow)'

[Map Local]
# в”Җв”Җ еҺҹ reject-dict иҪ¬жҚўдёә Egern еҺҹз”ҹејә Mock (йҳІзәўеӯ—жҠҘй”ҷ) в”Җв”Җ

# в”Җв”Җ ж»ҙж»ҙеҮәиЎҢ в”Җв”Җ
^https?:\/\/api\.didiglobal\.com\/gulfstream\/splash\/v1\/ad data-type=text data="{}" status-code=200
^https?:\/\/api\.didiglobal\.com\/gulfstream\/passenger\/v2\/app\/launch data-type=text data="{}" status-code=200

# в”Җв”Җ й“Ғи·Ҝ 12306 в”Җв”Җ
^https?:\/\/mobile\.12306\.cn\/otsmobile\/app\/mgs\/mgw\.htm\?operation=appAdList data-type=text data="{}" status-code=200

# в”Җв”Җ жҗәзЁӢж—…иЎҢ в”Җв”Җ
^https?:\/\/m\.ctrip\.com\/restapi\/soa2\/(16189\/json\/searchAppFloatWindow|14446\/json\/getSplashConfig) data-type=text data="{}" status-code=200

# в”Җв”Җ е“Ҳе•°еҮәиЎҢ в”Җв”Җ
^https?:\/\/api\.hellobike\.com\/api\.common\.activity\.AppAd\/getAd data-type=text data="{}" status-code=200
^https?:\/\/api\.hellobike\.com\/api\.common\.ad\.AdAdver\/getAdverList data-type=text data="{}" status-code=200

[MITM]
hostname = api.didiglobal.com, gts.diditaxi.com.cn, mobile.12306.cn, ad.12306.cn, api.hellobike.com, m.ctrip.com
