#!name=差旅出行去广告
#!desc=2026.06.18 更新 | 滴滴、12306、携程、哈啰 等主流出行平台去广告
#!author=AI优化, LoonKissSurge, ZenmoFeiShi, kokoryh, blackmatrix7, RuCu6, 可莉🅥, laoshu
#!homepage=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/TravelAdBlock.yaml

[Rule]
# ==================== 滴滴 ====================
DOMAIN,gwp.xiaojukeji.com,REJECT
DOMAIN,hd.xiaojukeji.com,REJECT
DOMAIN,ad.xiaojukeji.com,REJECT

# ==================== 12306 ====================
DOMAIN,ad.12306.cn,DIRECT   # 保留 DIRECT，由 JQ 精准处理

# ==================== 携程 ====================
DOMAIN,ad.ctrip.com,REJECT
DOMAIN,ma-adx.ctrip.com,REJECT
DOMAIN,ads.ctrip.com,REJECT

# ==================== 哈啰 ====================
DOMAIN,ad.hellobike.com,REJECT

[Rewrite]
# ================= JQ Data Processing =================
# 滴滴
http-response-jq ^https:\/\/conf\.diditaxi\.com\.cn\/homepage\/v\d+\/core\? '.data.disorder_cards.bottom_nav_list.data |= map(select(.id == "home_page" or .id == "user_center")) | .data.order_cards.nav_list_card.data |= map(select(.nav_id == "dache_anycar" or .nav_id == "carmate" or .nav_id == "driverservice" or .nav_id == "zhandianbashi" or .nav_id == "yuancheng" or .nav_id == "pincheche" or .nav_id == "bike" or .nav_id == "special_ride" or .nav_id == "nav_more_v3"))'
http-response-jq ^https:\/\/conf\.diditaxi\.com\.cn\/homepage\/v1\/other\/fast\? 'delpaths([["data","disorder_cards","communicate_card"],["data","disorder_cards","not_login_bottom_bar"],["data","disorder_cards","riding_code_card"],["data","order_cards","car_owner_widget_card"],["data","order_cards","marketing_card"],["data","order_cards","super_banner_card"]])'
http-response-jq ^https:\/\/common\.diditaxi\.com\.cn\/common\/v5\/usercenter\/layout$ '.data.instances |= (to_entries | map(select(.key as $k | ["center_base_info_card", "center_tool_card", "center_wallet_finance_card", "center_order_related_card"] | index($k))) | from_entries)'

# 12306
http-response-jq ^https:\/\/ad\.12306\.cn\/ad\/ser\/getAdList$ 'delpaths([["materialsList"], ["advertParam"]])'

# 携程 & 哈啰
http-response-jq ^https:\/\/m\.ctrip\.com\/restapi\/soa2\/\d+\/json\/getAdsList 'del(.data)'
http-response-jq ^https:\/\/api\.hellobike\.com\/api\.common\.activity\.AppAd\/getAd 'del(.data)'

[Script]
# 12306 去广告脚本
CR_Script = type=http-request, pattern=^https:\/\/mobile\.12306\.cn\/otsmobile\/app\/mgs\/mgw\.htm$, script-path=https://kelee.one/Resource/JavaScript/12306/12306_remove_ads.js, requires-body=true

[MITM]
hostname = hd.xiaojukeji.com, gwp.xiaojukeji.com, conf.diditaxi.com.cn, common.diditaxi.com.cn, api.udache.com, ad.12306.cn, mobile.12306.cn, m.ctrip.com, ad.ctrip.com, ma-adx.ctrip.com, api.hellobike.com, ad.hellobike.com