#!name=差旅出行去广告
#!desc=2026.07.20 更新 | 滴滴、12306、携程、哈啰 等主流出行平台去广告
#!author=AI优化, LoonKissSurge, ZenmoFeiShi, kokoryh, blackmatrix7, RuCu6, 可莉🅥, laoshu
#!homepage=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/TravelAdBlock.yaml

[Rule]
# ==================== 滴滴 ====================
DOMAIN,gwp.xiaojukeji.com,REJECT
DOMAIN,hd.xiaojukeji.com,REJECT
DOMAIN,ad.xiaojukeji.com,REJECT

# ==================== 12306 ====================
DOMAIN,ad.12306.cn,DIRECT   # 保留 DIRECT，由 JQ 精准处理

# ==================== 携程 ====================
DOMAIN,ad.ctrip.com,REJECT
DOMAIN,ma-adx.ctrip.com,REJECT
DOMAIN,ads.ctrip.com,REJECT

# ==================== 哈啰 ====================
DOMAIN,ad.hellobike.com,REJECT

[Rewrite]
# ================= JQ Data Processing =================
# 滴滴
http-response-jq ^https:\/\/conf\.diditaxi\.com\.cn\/homepage\/v\d+\/core\? '.data.disorder_cards.bottom_nav_list.data |= map(select(.id == "home_page" or .id == "user_center")) | .data.order_cards.nav_list_card.data |= map(select(.nav_id == "dache_anycar" or .nav_id == "carmate" or .nav_id == "driverservice" or .nav_id == "zhandianbashi" or .nav_id == "yuancheng" or .nav_id == "pincheche" or .nav_id == "bike" or .nav_id == "special_ride" or .nav_id == "nav_more_v3"))'
http-response-jq ^https:\/\/conf\.diditaxi\.com\.cn\/homepage\/v1\/other\/fast\? 'delpaths([["data","disorder_cards","communicate_card"],["data","disorder_cards","not_login_bottom_bar"],["data","disorder_cards","riding_code_card"],["data","disorder_cards","car_icon","data","icon_info_new_agreement"],["data","order_cards","car_owner_widget_card"],["data","order_cards","marketing_card"],["data","order_cards","super_banner_card"]])'
http-response-jq ^https:\/\/common\.diditaxi\.com\.cn\/common\/v5\/usercenter\/layout$ '.data.instances |= (to_entries | map(select(.key as $k | ["center_base_info_card", "center_tool_card", "center_wallet_finance_card", "center_order_related_card"] | index($k))) | from_entries) | .data.instances.center_wallet_finance_card.data.view_info |= map(select(.title == "优惠卡券" or .title == "余额" or .title == "福利金"))'
http-response-jq ^https:\/\/api\.udache\.com\/gulfstream\/porsche\/v1\/dache_homepage_layout\? '.data.instances |= (to_entries | map(select(.key | test("feed_back_|dache_main_member|order_container_|dache_main_core_icon|dache_main_card_"))) | from_entries)'
http-response-jq ^https:\/\/api\.udache\.com\/gulfstream\/porsche\/v1\/pSFCHomePage\? '.data |= (if . == null then null else {hot_route_info, legal_info} end) | . as $root | .data.tab_list = ($root.data.tab_list | map(select(.tab_id == "passenger")))'
http-response-jq ^https:\/\/api\.udache\.com\/intercity\/ticket\/api\/v1\/core\/getFullPageInfoLayout\? '.data.disorder_components |= map(select(.name == "history_order_card" or .name == "inprogress_order_card" or .name == "station_calendar" or .name == "main_card_v2" or .name == "user_history_order"))'
http-response-jq ^https:\/\/daijia\.kuaidadi\.com(:443)?\/gateway\? 'delpaths([["data","variantInfo"]]) | .data |= with_entries(select(.value.isAd != 1))'
http-response-jq ^https:\/\/htwkop\.xiaojukeji\.com(:443)?\/gateway\? 'delpaths([["data","didi-bike-homepage-popup"],["data","variantInfo"]])'
http-response-jq ^https:\/\/as\.xiaojukeji\.com\/ep\/as\/toggles\? '.data |= map(if .name|IN("daijia_journey_new_tcp_switch","daijia_tcp_init","daijia_tcp_msg_encrypt","daijia_tcp_site_info","daijia_tcp_site_report")then.allow=false else . end)'

# 12306
http-response-jq ^https:\/\/ad\.12306\.cn\/ad\/ser\/getAdList$ 'delpaths([["materialsList"], ["advertParam"]])'

# 携程 & 哈啰
http-response-jq ^https:\/\/m\.ctrip\.com\/restapi\/soa2\/\d+\/json\/getAdsList 'del(.data)'
http-response-jq ^https:\/\/api\.hellobike\.com\/api\.common\.activity\.AppAd\/getAd 'del(.data)'

[Map Local]
# 滴滴
^https:\/\/res\.xiaojukeji\.com\/resapi\/activity\/mget data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/lion\.didialift\.com\/broker\/\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/conf\.diditaxi\.com\.cn\/homepage\/v1\/other\/slow\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/ct\.xiaojukeji\.com\/agent\/v3\/feeds\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/conf\.diditaxi\.com\.cn\/dynamic\/conf data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/poi\.map\.xiaojukeji\.com\/mapapi\/recommend\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"

[Script]
# 12306 去广告脚本
CR_Script = type=http-request, pattern=^https:\/\/mobile\.12306\.cn\/otsmobile\/app\/mgs\/mgw\.htm$, script-path=https://kelee.one/Resource/JavaScript/12306/12306_remove_ads.js, requires-body=true

[MITM]
hostname = hd.xiaojukeji.com, gwp.xiaojukeji.com, conf.diditaxi.com.cn, common.diditaxi.com.cn, api.udache.com, as.xiaojukeji.com, lion.didialift.com, ct.xiaojukeji.com, res.xiaojukeji.com, poi.map.xiaojukeji.com, daijia.kuaidadi.com, htwkop.xiaojukeji.com, ad.12306.cn, mobile.12306.cn, m.ctrip.com, ad.ctrip.com, ma-adx.ctrip.com, api.hellobike.com, ad.hellobike.com