[Rewrite]
# ── URL 拒绝 ──
^https?:\/\/ads\.kugou\.com\/.* reject
^https?:\/\/splash\.kugou\.com\/.* reject
^https?:\/\/.*\.kuwo\.cn\/openapi\/v1\/app\/pasterAd reject
^https?:\/\/rich\.kuwo\.cn\/AdService reject
^https?:\/\/bd-api\.kuwo\.cn\/.* reject
# 酷狗额外VIP/广告弹窗拒绝（来自Yu9191）
^https:\/\/vipssr\.kugou\.com\/static\/js\/async\/flexPayPopup reject
^https:\/\/.*\.kugou\.com\/vipssr\/prepay_ios\.html reject
^https:\/\/staticssl\.kugou\.com\/common\/js-lib\/vip\/dlg_ctrler_v2\.js$ reject
^https:\/\/h5\.kugou\.com\/apps\/vipcenter\/_next\/static\/css reject
^https:\/\/vipssr\.kugou\.com\/static\/js\/vip\/newUi\/vipPageUnionIosContent- reject
^https:\/\/fx\.service\.kugou\.com\/fx\/activity\/register\/center\/sidebar\/configV2$ reject
^https:\/\/service1\.fanxing\.kugou\.com\/video\/mo\/live\/pull\/mutiline\/cfg reject
^http:\/\/log\.web\.kugou\.com\/postEvent\.php$ reject

# ── Spotify Header 防缓存 ──
^https:\/\/.*spotify\.com\/bootstrap\/v1\/bootstrap request-header-del if-none-match
^https:\/\/.*spotify\.com\/bootstrap\/v1\/bootstrap request-header-del etag
^https:\/\/.*spotify\.com\/user-customization-service\/v1\/customize request-header-del if-none-match
^https:\/\/.*spotify\.com\/user-customization-service\/v1\/customize request-header-del etag

# ── Spotify URL修复（artistview平台切换，来自用户Spotify.yaml） ──
^https:\/\/(?:\w+-spclient|spclient\.wg)\.spotify\.com\/artistview\/v1\/artist\/(.*)&platform=iphone https://spclient.wg.spotify.com/artistview/v1/artist/$1&platform=ipad

# ── 汽水音乐 JQ 净化 ──
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/me\? 'del(.reward_ad_banner)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/card 'del(.preview_guide)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/search-block 'del(.search_chart_block)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/activities 'del(.activity_map)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/feed\/song-tab '.items |= map(select(.type == "track"))'

[Map Local]
# ── YouTube (Music) Initplayback 广告 ──
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad data-type=text data="" status-code=200 header="Content-Type:text/plain"

# ── Spotify Pendragon 广告配置清空（关键修复，来自用户Spotify.yaml） ──
^https?:\/\/.*spotify\.com\/pendragon\/ data-type=text data="{}" status-code=200 header="Content-Type:application/json"

