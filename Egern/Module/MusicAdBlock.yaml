[Rule]
# ── 酷狗 / 酷我 ──
DOMAIN,ad.kugou.com,REJECT
DOMAIN,ads.kugou.com,REJECT
DOMAIN,gsp.kugou.com,REJECT
DOMAIN,adserv.kuwo.cn,REJECT
DOMAIN,rich.kuwo.cn,REJECT
DOMAIN,log.kuwo.cn,REJECT
DOMAIN,mobilead.kuwo.cn,REJECT
DOMAIN,kaiping.kuwo.cn,REJECT
DOMAIN,mgxhtj.kuwo.cn,REJECT

# ── Spotify (已还原网页翻译导致的乱码域名) ──
DOMAIN,audio-ads.spotify.com,REJECT
DOMAIN,ads-fa.spotify.com,REJECT
DOMAIN-KEYWORD,-ad-spotify.com,REJECT
DOMAIN,analytics.spotify.com,REJECT
DOMAIN,audio-ak-spotify-com.akamaized.net,REJECT
DOMAIN,b.scorecardresearch.com,REJECT

# ── 网易云音乐 ──
DOMAIN,admusicpic.music.126.net,REJECT
DOMAIN,iadmat.nosdn.127.net,REJECT
DOMAIN,iadmusicmat.music.126.net,REJECT
DOMAIN,iadmusicmatvideo.music.126.net,REJECT
DOMAIN,iadmatapk.nosdn.127.net,REJECT
DOMAIN,ipv4.music.163.com,REJECT
DOMAIN,ipv6.music.163.com,REJECT

# ── QQ音乐 ──
DOMAIN,tmead.y.qq.com,REJECT
DOMAIN,ad.y.qq.com,REJECT
DOMAIN,ads.music.qq.com,REJECT
DOMAIN,ad.tencentmusic.com,REJECT
DOMAIN,adstats.tencentmusic.com,REJECT
DOMAIN,adcdn.tencentmusic.com,REJECT
DOMAIN,adexpo.tencentmusic.com,REJECT
DOMAIN,adclick.tencentmusic.com,REJECT
DOMAIN,monitor.music.qq.com,REJECT
DOMAIN,stat.y.qq.com,REJECT
DOMAIN,oth.str.mdt.qq.com,REJECT
DOMAIN,h.trace.qq.com,REJECT
DOMAIN,us.l.qq.com,REJECT

[Rewrite]
# ── URL 拒绝 ──
^https?:\/\/ads\.kugou\.com\/.* reject
^https?:\/\/splash\.kugou\.com\/.* reject
^https?:\/\/.*\.kuwo\.cn\/openapi\/v1\/app\/pasterAd reject
^https?:\/\/rich\.kuwo\.cn\/AdService reject
^https?:\/\/bd-api\.kuwo\.cn\/.* reject

# ── Spotify Header 防缓存 ──
^https:\/\/.*spotify\.com\/bootstrap\/v1\/bootstrap request-header-del if-none-match
^https:\/\/.*spotify\.com\/bootstrap\/v1\/bootstrap request-header-del etag
^https:\/\/.*spotify\.com\/user-customization-service\/v1\/customize request-header-del if-none-match
^https:\/\/.*spotify\.com\/user-customization-service\/v1\/customize request-header-del etag

# ── 汽水音乐 JQ 净化 ──
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/me\? 'del(.reward_ad_banner)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/card 'del(.preview_guide)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/search-block 'del(.search_chart_block)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/activities 'del(.activity_map)'
http-response-jq ^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/feed\/song-tab '.items |= map(select(.type == "track"))'

[Map Local]
# ── YouTube (Music) Initplayback 广告 ──
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad data-type=text data="" status-code=200 header="Content-Type:text/plain"

# ── 网易云音乐 ──
^https?:\/\/interface\d?\.music\.163\.com\/eapi\/(?:delivery\/(batch-)?deliver|moment\/tab\/info\/|side-bar\/mini-program\/music-service\/account|yunbei\/account\/entrance\/|community\/friends\/fans-group\/artist\/group\/|mine\/applet\/redpoint|music\/songshare\/text\/recommend\/|resniche\/position\/play\/new\/|resniche\/tspopup\/show|resource\/comments?\/musiciansaid\/|user\/sub\/artist|ios\/version|mlivestream\/entrance\/playpage\/|link\/position\/show\/strategy|link\/scene\/show\/resource|v1\/content\/exposure\/comment\/banner\/) data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/interface\d?\.music\.163\.com\/w?eapi\/(?:activity\/bonus\/playpage\/time\/query|resource-exposure\/|search\/(?:chart\/|rcmd\/keyword\/|specialkeyword\/)) data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/interface\d\.music\.163\.com\/eapi\/my\/podcast\/tab\/recommend data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/interface\d?\.music\.163\.com\/e?api\/(ocpc\/)?ad\/ data-type=text data="" status-code=200 header="Content-Type:text/plain"
^https?:\/\/interface\d?\.music\.163.com\/w?e?api\/search\/default data-type=text data="" status-code=200 header="Content-Type:text/plain"
^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/content\/activity\/music\/jar\/template\/list data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/sp\/flow\/popup\/query data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── QQ音乐 ──
^https?:\/\/us\.l\.qq\.com\/exapp data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/y\.gtimg\.cn\/music\/common\/upload\/(t_splash_info|targeted_ads|kg_ad) data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 汽水音乐 ──
^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/luna\/(media_ads|ads|commerce|hashtag\/recommend) data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https:\/\/(beta-luna\.douyin\.com|api\.qishui\.com)\/location\/info data-type=text data="{}" status-code=200 header="Content-Type:application/json"

[Script]
# ── 酷狗 / 酷我 ──
酷狗_核心净化 = type=http-response, pattern=^https?:\/\/.*\.kugou\.com\/(v[0-9]+|openapi|userdata|ssr|vip|card)\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/Yu9191/Rewrite/refs/heads/main/kugou.js
酷我_核心净化 = type=http-response, pattern=^https?:\/\/.*\.kuwo\.cn\/(openapi|mobi|vip|homepages)\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/Yuheng0101/X/main/Scripts/kuwo.js

# ── Spotify Kelee 增强组 ──
Spotify_Tracks增强 = type=http-response, pattern=^https:\/\/api\.spotify\.com\/v1\/tracks, requires-body=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/Spotify_response.js
Spotify_歌词请求JSON = type=http-request, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/.+format=json, requires-body=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/Spotify_request.js
Spotify_歌词请求Proto = type=http-request, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/, requires-body=true, binary-body-mode=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/Spotify_request.js
Spotify_翻译歌词JSON = type=http-response, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/.+subtype=Translate, requires-body=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/Translate_response.js
Spotify_翻译歌词Proto = type=http-response, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/, requires-body=true, binary-body-mode=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/Translate_response.js
Spotify_External歌词JSON = type=http-response, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/.+subtype=External, requires-body=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/External_Lyrics_response.js
Spotify_External歌词Proto = type=http-response, pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/, requires-body=true, binary-body-mode=true, timeout=20, script-path=https://kelee.one/Resource/JavaScript/Spotify/External_Lyrics_response.js
Spotify_去广告核心 = type=http-response, pattern=^https:\/\/.*spotify\.com\/(bootstrap|user-customization-service), requires-body=true, binary-body-mode=true, timeout=20, argument=[false,true], script-path=https://kelee.one/Resource/JavaScript/Spotify/Spotify_remove_ads.js

# ── YouTube (Music) Enhance (写入硬编码 JSON 参数) ──
YTM_Enhance = type=http-response, pattern=^https:\/\/youtubei\.googleapis\.com\/(youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch))(\?(.*))?$, requires-body=true, binary-body-mode=true, argument={"lyricLang":"off","captionLang":"off","blockUpload":true,"blockImmersive":true,"blockShorts":false,"debug":false}, script-path=https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js

# ── 网易云音乐 ──
网易云_核心净化 = type=http-response, pattern=^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/(link|ad|search|vipnewcenter|side-bar|vip)\/.*, requires-body=true, script-path=https://gist.githubusercontent.com/ddgksf2013/4f53b7c6083678df25fecc8ff68b52c4/raw/netease.adblock.js

[MITM]
hostname = *.kugou.com, *.kuwo.cn, *.spotify.com, youtubei.googleapis.com, *.googlevideo.com, interface*.music.163.com, *.music.126.net, music.163.com, beta-luna.douyin.com, api.qishui.com, *.y.qq.com, *.tencentmusic.com, y.gtimg.cn, music.qq.com
