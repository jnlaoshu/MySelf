#!name=音乐流媒体净化
#!desc=2026.04.05 | 整合酷狗·酷我·Spotify·YT Music·网易云·汽水·QQ音乐
#!author=Yu9191, Yuheng0101, app2smile, Maasea, ddgksf2013, zqzess
#!homepage=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/MusicAdBlock.yaml

[Rule]

# ── 酷狗 / 酷我 ──
DOMAIN,ad.kugou.com,REJECT
DOMAIN,ads.kugou.com,REJECT
DOMAIN,gsp.kugou.com,REJECT
DOMAIN,adserv.kuwo.cn,REJECT
DOMAIN,rich.kuwo.cn,REJECT
DOMAIN,log.kuwo.cn,REJECT
DOMAIN,mobilead.kuwo.cn,REJECT
DOMAIN,kaiping.kuwo.cn,REJECT
DOMAIN,mgxhtj.kuwo.cn,REJECT

# ── Spotify ──
DOMAIN,audio-ads.spotify.com,REJECT
DOMAIN,ads-fa.spotify.com,REJECT
DOMAIN-KEYWORD,-ad-spotify.com,REJECT
DOMAIN,analytics.spotify.com,REJECT

# ── 网易云音乐 ──
DOMAIN,admusicpic.music.126.net,REJECT
DOMAIN,iadmat.nosdn.127.net,REJECT
DOMAIN,iadmusicmat.music.126.net,REJECT
DOMAIN,iadmusicmatvideo.music.126.net,REJECT
DOMAIN,iadmatapk.nosdn.127.net,REJECT
DOMAIN,httpdns.music.163.com,REJECT
DOMAIN,httpdns.n.netease.com,REJECT

# ── QQ音乐 ──
DOMAIN,tmead.y.qq.com,REJECT
DOMAIN,ad.y.qq.com,REJECT
DOMAIN,ads.music.qq.com,REJECT
DOMAIN,ad.tencentmusic.com,REJECT
DOMAIN,adstats.tencentmusic.com,REJECT
DOMAIN,adcdn.tencentmusic.com,REJECT
DOMAIN,adexpo.tencentmusic.com,REJECT
DOMAIN,adclick.tencentmusic.com,REJECT
DOMAIN,monitor.music.qq.com,REJECT
DOMAIN,stat.y.qq.com,REJECT
DOMAIN,oth.str.mdt.qq.com,REJECT
DOMAIN,h.trace.qq.com,REJECT
DOMAIN,us.l.qq.com,REJECT

[Rewrite]

# ── URL 级拦截 ──
^https?:\/\/spclient\.wg\.spotify\.com\/(ad-logic|ads|ad)\/ reject
^https?:\/\/ads\.kugou\.com\/.* reject
^https?:\/\/splash\.kugou\.com\/.* reject
^https?:\/\/.*\.kuwo\.cn\/openapi\/v1\/app\/pasterAd reject
^https?:\/\/rich\.kuwo\.cn\/AdService reject
^https?:\/\/bd-api\.kuwo\.cn\/.* reject

# ── 汽水音乐（JQ 净化） ──
http-response-jq ^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/me\? 'del(.reward_ad_banner)'
http-response-jq ^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/card 'del(.preview_guide)'
http-response-jq ^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/search-block 'del(.search_chart_block)'
http-response-jq ^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/activities 'del(.activity_map)'
http-response-jq ^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/feed\/song-tab '.items |= map(select(.type == "track"))'

[Map Local]

# ── 网易云音乐（活动弹窗 & VIP 启动页） ──
^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/content\/activity\/music\/jar\/template\/list data-type=text data="{}" status-code=200
^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/sp\/flow\/popup\/query data-type=text data="{}" status-code=200

# ── QQ音乐（开屏 & 启动广告） ──
^https?:\/\/us\.l\.qq\.com\/exapp data-type=text data="{}" status-code=200
^https?:\/\/y\.gtimg\.cn\/music\/common\/upload\/(t_splash_info|targeted_ads|kg_ad) data-type=text data="{}" status-code=200

# ── 汽水音乐（视频广告、弹窗、位置、DNS） ──
^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/luna\/(media_ads|ads|commerce|hashtag\/recommend) data-type=text data="{}" status-code=200
^https:\/\/[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+){1,3}\/location\/info data-type=text data="{}" status-code=200
^https:\/\/tnc.*zijieapi\.com\/get_domains data-type=text data="{}" status-code=200

[Script]
酷狗_核心净化 = type=http-response, pattern=^https?:\/\/.*\.kugou\.com\/(v[0-9]+|openapi|userdata)\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/Yu9191/Rewrite/main/KuGou.js
酷我_核心净化 = type=http-response, pattern=^https?:\/\/.*\.kuwo\.cn\/(openapi|mobi)\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/Yuheng0101/X/main/Scripts/Kuwo/kuwo.js
Spotify_核心净化 = type=http-response, pattern=^https:\/\/spclient\.wg\.spotify\.com\/(bootstrap\/v1\/bootstrap|color-lyrics\/v2\/track\/), requires-body=true, script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/spotify.js
YTM_Req = type=http-request, pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting), requires-body=true, script-path=https://raw.githubusercontent.com/Maasea/YouTube-Adblock/main/youtube.js
YTM_Res = type=http-response, pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting), requires-body=true, script-path=https://raw.githubusercontent.com/Maasea/YouTube-Adblock/main/youtube.js
网易云_核心净化 = type=http-response, pattern=^https?:\/\/interface(\d)?\.music\.163\.com\/e?api\/(link|ad|search|vipnewcenter|side-bar|vip)\/.*, requires-body=true, script-path=https://gist.githubusercontent.com/ddgksf2013/4f53b7c6083678df25fecc8ff68b52c4/raw/netease.adblock.js

[MITM]
hostname = *.kugou.com, *.kuwo.cn, spclient.wg.spotify.com, youtubei.googleapis.com, interface*.music.163.com, *.music.126.net, music.163.com, beta-luna.douyin.com, api.qishui.com, tnc*-*.zijieapi.com, *.y.qq.com, *.tencentmusic.com, y.gtimg.cn, music.qq.com