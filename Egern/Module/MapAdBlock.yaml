name: "地图三合一去广告"
description: "2026.06.18 08:56 加强版 | 高德、百度、腾讯地图首页广告重点优化"
author: "AI优化, RuCu6, ddgksf2013, fmz200, bai1zi, 可莉🅥, laoshu"
homepage: "https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/MapAdBlock.yaml"

rules:
  # 高德地图
  - domain:
      match: "amap-aos-info-nogw.amap.com"
      policy: REJECT
  - domain:
      match: "free-aos-cdn-image.amap.com"
      policy: REJECT
  - domain_suffix:
      match: "v.smtcdns.com"
      policy: REJECT

  # 百度地图
  - domain:
      match: "httpdns.baidubce.com"
      policy: REJECT
  - domain:
      match: "dss0.bdstatic.com"
      policy: REJECT
  - domain:
      match: "tb1.bdstatic.com"
      policy: REJECT
  - domain:
      match: "tb2.bdstatic.com"
      policy: REJECT
  - domain:
      match: "ss0.bdstatic.com"
      policy: REJECT
  - domain:
      match: "gss0.bdstatic.com"
      policy: REJECT

  # 腾讯地图
  - domain:
      match: "adstats.map.qq.com"
      policy: REJECT
  - domain_suffix:
      match: "pgdt.gtimg.cn"
      policy: REJECT

body_rewrites:
  # 高德地图 - 首页加强
  - response_jq:
      match: "^https://m5\\.amap\\.com/ws/.*"
      filter: 'delpaths([["data","commonMaterial"],["data","tipsOperationLocation"],["data","resourcePlacement"],["history_tags"],["data","operation"],["data","banner"],["data","popup"],["data","float"],["data","ad"],["data","recommend"],["data","homePage"],["data","mainPage"]])'
  - response_jq:
      match: "^https://m5-zb\\.amap\\.com/ws/.*"
      filter: 'delpaths([["data","carTips","data","popupInfo"],["data","ad_info"],["data","operation"],["data","banner"]])'

  # 百度地图 - 首页重点加强
  - response_jq:
      match: "^https?://newclient\\.map\\.baidu\\.com/.*"
      filter: 'del(.data.sport_card, .data.gold, .data.gold_coin_card, .data.shop, .data.usersystem_b_banner, .data.coupon_card, .data.merchant_card, .data.live_card, .data.task_card, .data.member_card, .data.nearby_card, .data.ads, .data.promotion, .data.banner, .data.popup, .data.float_card, .data.ad_info, .data.recommend, .data.hot_words, .data.operation)'

  # 腾讯地图
  - response_jq:
      match: "^https?://sv\\.map\\.qq\\.com/txmap/.*"
      filter: 'delpaths([["data","ad_info"],["data","recommend"],["data","operation"],["data","float_card"],["data","popup"],["data","banner"]]) | if .result then .result.adInfo=[] else . end'

map_locals:
  # 高德首页兜底
  - match: "^https://m5.*\\.amap\\.com/ws/.*(home|main|recommend|operation|banner|popup|ad)"
    status_code: 200
    headers:
      Content-Type: application/json
    body: '{}'
  # 百度首页兜底
  - match: "^https?://newclient\\.map\\.baidu\\.com/.*(home|recommend|operation|banner|popup|ad)"
    status_code: 200
    headers:
      Content-Type: application/json
    body: '{}'
  # 腾讯地图
  - match: "^https://sv\\.map\\.qq\\.com/txmap/.*(ad|banner|popup|operation)"
    status_code: 200
    headers:
      Content-Type: application/json
    body: '{}'

scriptings:
  - http_response:
      name: "高德广告清理_m5"
      match: "^https://m5\\.amap\\.com/ws/.*"
      script_url: "https://kelee.one/Resource/JavaScript/Amap/Amap_remove_ads.js"
      body_required: true
  - http_response:
      name: "高德广告清理_m5zb"
      match: "^https://m5-zb\\.amap\\.com/ws/.*"
      script_url: "https://kelee.one/Resource/JavaScript/Amap/Amap_remove_ads.js"
      body_required: true
  - http_response:
      name: "百度地图核心净化"
      match: "^https?://newclient\\.map\\.baidu\\.com/.*"
      script_url: "https://ddgksf2013.top/scripts/bdmap.ads.js"
      body_required: true

mitm:
  hostnames:
    includes:
      - "*.amap.com"
      - "newclient.map.baidu.com"
      - "*.bdstatic.com"
      - "*.map.qq.com"