#!name=高德地图去广告
#!desc=屏蔽开屏/搜索/首页/路线/附近/打车/消息推广（脚本源：ddgksf2013）
#!author=jnlaoshu
#!category=AdBlock
#!date=2026-04-02
#!upstream-commit=amap.js@87737f3
#!source=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/AmapAdBlock.yaml

[Rule]
# ── 广告域名拦截 ──
DOMAIN,amap-aos-info-nogw.amap.com,REJECT
DOMAIN,free-aos-cdn-image.amap.com,REJECT
DOMAIN,optimus-ads.amap.com,REJECT
DOMAIN-SUFFIX,v.smtcdns.com,REJECT

[Rewrite]
# ── JQ 字段清理 ──
http-response-jq ^https:\/\/m5\.amap\.com\/ws\/shield\/search_business\/process\/marketingOperationStructured\? 'delpaths([["data","commonMaterial"],["data","tipsOperationLocation"],["data","resourcePlacement"]])'
http-response-jq ^https:\/\/m5\.amap\.com\/ws\/shield\/search_poi\/homepage\? 'delpaths([["history_tags"]])'
http-response-jq ^https:\/\/m5-zb\.amap\.com\/ws\/sharedtrip\/taxi\/order_detail_car_tips\? 'delpaths([["data","carTips","data","popupInfo"]])'

# ── Mock 空响应 ──
^https:\/\/m5\.amap\.com\/ws\/faas\/amap-navigation\/card-service-car-end - reject-dict
^https:\/\/m5\.amap\.com\/ws\/shield\/search_poi\/tips_adv - reject-dict
^https:\/\/m5-zb\.amap\.com\/ws\/boss\/order_web\/\w{8}_information - reject-dict

[Script]
# ── 开屏广告 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/(valueadded|aos)\/alimama\/splash_screen script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_开屏
# ── 我的页面 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/shield\/dsp\/profile\/index\/nodefaas script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_我的页面
# ── 搜索热词 & 场景推荐 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/shield\/search\/new_hotword script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_搜索热词
http-response ^https?:\/\/.*\.amap\.com\/ws\/shield\/scene\/recommend script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_场景推荐
# ── 路线规划 & 首页 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/faas\/amap-navigation\/(card-service-route-plan|main-page) script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_路线首页
# ── 附近推荐 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/shield\/search\/nearbyrec_smart script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_附近
# ── 打车推广 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/promotion-web\/resource script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_打车
# ── 消息中心 ──
http-response ^https?:\/\/(.*\.amap\.com|sns\.amap\.com)\/ws\/msgbox\/pull script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_消息
# ── FROG 推广位 ──
http-response ^https?:\/\/.*\.amap\.com\/ws\/shield\/frogserver\/aocs\/updatable script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js, requires-body=true, tag=高德_推广位

[MITM]
hostname = *.amap.com, m5-zb.amap.com, sns.amap.com
