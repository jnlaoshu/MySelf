🟡 新增问题：type: request + $done({ response }) 模式待验证

- name: 高德地图_本地空响应拦截
  type: request
  inline: |
    $done({
      response: {
        status: 200,
        headers: { "Content-Type": "application/json" },
        body: "{}"
      }
    });


在 Surge 中，request 脚本可以通过 $done({ response: {...} }) 直接短路返回本地响应，这是其官方支持的行为。Egern 是否支持同一模式目前无官方文档明确记载，存在以下两种可能：
	∙	✅ Egern 兼容了该 API → 脚本正常生效，这是最优方案
	∙	❌ Egern 不支持该格式 → $done() 被忽略，请求照常发出，广告拦截完全失效
建议实机验证：用 Network 日志确认这三条接口是否真的返回了本地 {}，还是依然访问了远端服务器。
若验证不通过，最保险的回退方案是将这三条改回 type: response 内联脚本（仅在收到真实响应后由脚本覆盖 body），虽然无法节省流量，但兼容性有保证。

