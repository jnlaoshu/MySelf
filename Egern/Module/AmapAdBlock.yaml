name: "高德地图去广告【高级脚本版】"
description: "极限净化·原生适配 Egern，极速无感去广告。"
author: "AI / RuCu6 / ddgksf2013"

rules:
  - domain: amap-aos-info-nogw.amap.com
    policy: REJECT
  - domain: free-aos-cdn-image.amap.com
    policy: REJECT
  - domain: optimus-ads.amap.com
    policy: REJECT
  - domain_suffix: v.smtcdns.com
    policy: REJECT

url_rewrites:
  - match: '^https?://m5(-zb)?\.amap\.com/ws/(valueadded/weather|shield/search_poi/tips_adv|boss/order_web/\w{8}_information)'
    type: reject

scriptings:
  - name: 高德地图_JQ辅助清理
    match: '^https?://m5(-zb)?\.amap\.com/ws/(shield/search_business/process/marketingOperationStructured|shield/search_poi/homepage|sharedtrip/taxi/order_detail_car_tips)'
    type: response
    requires_body: true
    inline: |
      let body = $response.body;
      try {
        let obj = JSON.parse(body);
        let url = $request.url;
        if (url.includes("marketingOperationStructured") && obj.data) {
          delete obj.data.commonMaterial;
          delete obj.data.tipsOperationLocation;
          delete obj.data.resourcePlacement;
        }
        if (url.includes("search_poi/homepage")) {
          delete obj.history_tags;
        }
        if (url.includes("order_detail_car_tips") && obj.data?.carTips?.data) {
          delete obj.data.carTips.data.popupInfo;
        }
        body = JSON.stringify(obj);
      } catch(e) {}
      $done({ body });

  - name: 高德地图_核心高级脚本
    match: '^https?://.*\.amap\.com/ws/(valueadded/alimama/splash_screen|aos/alimama/splash_screen|shield/dsp/profile/index/nodefaas|shield/search/new_hotword|shield/scene/recommend|faas/amap-navigation/(card-service-route-plan|card-service-car-end|main-page)|shield/search/nearbyrec_smart|promotion-web/resource|msgbox/pull|shield/frogserver/aocs/updatable)'
    type: response
    requires_body: true
    url: https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js

mitm:
  hostnames:
    - '*.amap.com'
