[Rule]
# 180.76.76.200 是 IP 地址，DOMAIN 规则不适用，如需拦截请改用：
# IP-CIDR,180.76.76.200/32,REJECT
DOMAIN,dss0.bdstatic.com,REJECT
DOMAIN,tb1.bdstatic.com,REJECT
DOMAIN,tb2.bdstatic.com,REJECT

[Script]
# ── 开屏 & 首页推广 ──
http-response ^https?://newclient\.map\.baidu\.com/client/phpui2/\?qt=ads script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_开屏
# ── 搜索推广词 ──
http-response ^https?://newclient\.map\.baidu\.com/client/phpui.*qt=hw script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_搜索
# ── 跨界营销 ──
http-response ^https?://newclient\.map\.baidu\.com/client/crossmarketing script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_营销
# ── 个人中心 ──
http-response ^https?://newclient\.map\.baidu\.com/client/usersystem/home/dynamic script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_个人中心
# ── 消息中心 ──
http-response ^https?://newclient\.map\.baidu\.com/client/msgcenter/pull script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_消息
# ── 首页小横条 ──
http-response ^https?://newclient\.map\.baidu\.com/client/noticebar/get script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_横条
# ── 活动推广 ──
http-response ^https?://newclient\.map\.baidu\.com/operation/activity script-path=https://ddgksf2013.top/scripts/bdmap.ads.js, requires-body=true, tag=百度_活动

[MITM]
hostname = newclient.map.baidu.com, *.map.baidu.com, dss0.bdstatic.com, tb1.bdstatic.com, tb2.bdstatic.com, httpdns.baidubce.com
