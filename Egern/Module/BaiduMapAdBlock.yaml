#!name=百度地图去广告
#!desc=屏蔽开屏/搜索/营销/个人中心/消息/活动推广（脚本源：ddgksf2013）
#!author=jnlaoshu
#!category=AdBlock
#!date=2026-04-02
#!upstream-commit=bdmap.ads.js@unknown
#!source=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/BaiduMapAdBlock.yaml

[Rule]
# ── 广告域名拦截 ──
# 注：180.76.76.200 为纯 IP，DOMAIN 规则不适用，改用 IP-CIDR
DOMAIN,dss0.bdstatic.com,REJECT
DOMAIN,tb1.bdstatic.com,REJECT
DOMAIN,tb2.bdstatic.com,REJECT
IP-CIDR,180.76.76.200/32,REJECT,no-resolve

[Rewrite]
# ── JQ 字段清理 ──
http-response-jq ^https?:\/\/newclient\.map\.baidu\.com\/usercenter\/mine\/page 'del(.data.sport_card, .data.gold, .data.gold_coin_card, .data.shop, .data.usersystem_b_banner)'
http-response-jq ^https?:\/\/newclient\.map\.baidu\.com\/living\/nearby\/hot-words\? '.Result.data=[]'
http-response-jq ^https?:\/\/.*map\.baidu\.com\/.*govui\/rich_content '.data.posts.content=[]'
http-response-jq ^https?:\/\/newclient\.map\.baidu\.com\/voice\/pack\/list 'del(.data.recommand_list)'
http-response-jq ^https?:\/\/newclient\.map\.baidu\.com\/client\/noticebar\/get\? 'del(.content.multi_data)'

# ── Mock 空响应 ──
^https?:\/\/newclient\.map\.baidu\.com\/contributor-bus\/bounty\/tips - reject-dict
^https?:\/\/newclient\.map\.baidu\.com\/skin\/center\/recommend - reject-dict

[Script]
# ── 开屏 & 首页推广 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/phpui2\/\?qt=ads script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_开屏
# ── 搜索推广词 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/phpui.*qt=hw script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_搜索
# ── 跨界营销 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/crossmarketing script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_营销
# ── 个人中心动态 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/usersystem\/home\/dynamic script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_个人中心
# ── 消息中心 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/msgcenter\/pull script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_消息
# ── 首页小横条 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/client\/noticebar\/get script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_横条
# ── 活动推广 ──
http-response ^https?:\/\/newclient\.map\.baidu\.com\/operation\/activity script-path=https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js, requires-body=true, tag=百度_活动

[MITM]
hostname = newclient.map.baidu.com, *.map.baidu.com, dss0.bdstatic.com, tb1.bdstatic.com, tb2.bdstatic.com, httpdns.baidubce.com
