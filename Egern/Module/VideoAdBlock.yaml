[Rule]
# ── 腾讯视频 ──
DOMAIN,adsmind.gdtimg.com,REJECT
DOMAIN,tmead.y.qq.com,REJECT
DOMAIN,btrace.qq.com,REJECT
DOMAIN,btrace.video.qq.com,REJECT
DOMAIN,advideo.qq.com,REJECT
DOMAIN,ad.qq.com,REJECT

# ── 爱奇艺 ──
DOMAIN,t7z.cupid.iqiyi.com,REJECT
DOMAIN,t7z.cupid.ptqy.gitv.tv,REJECT
DOMAIN,msg.iqiyi.com,REJECT
DOMAIN,cupid.iqiyi.com,REJECT
DOMAIN,ad.iqiyi.com,REJECT

# ── 优酷视频 ──
DOMAIN,ad.m.youku.com,REJECT
DOMAIN,val.youku.com,REJECT
DOMAIN,lstat.youku.com,REJECT
DOMAIN,ykad.youku.com,REJECT

# ── 芒果 TV ──
DOMAIN,da.mgtv.com,REJECT
DOMAIN,x-da.mgtv.com,REJECT
DOMAIN,ad.mgtv.com,REJECT

# ── 哔哩哔哩 ──
# 注意：app.bilibili.com 和 api.bilibili.com 是核心接口，绝不能REJECT！仅拦截广告相关子域名
DOMAIN,mall.bilibili.com,REJECT
DOMAIN,cm.bilibili.com,REJECT

[Map Local]
# ── 腾讯视频（开屏/弹窗/日志） ──
^https?:\/\/livew\.l\.qq\.com\/livemsg\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/ad\.qq\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 爱奇艺（开屏/日志/广告接口） ──
^https?:\/\/ifacelog\.iqiyi\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/dash-api\.iqiyi\.com\/mac\/api\/ad\/ data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/cupid\.iqiyi\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 优酷视频（启动/广告数据） ──
^https?:\/\/vali\.cp31\.ott\.cibntv\.net\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/ykad-data\.youku\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/ad\.m\.youku\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 芒果 TV（开屏/广告） ──
^https?:\/\/app\.mgtv\.com\/v1\/splash\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/ad\.mgtv\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 哔哩哔哩（开屏/青少年模式/弹窗） ──
^https?:\/\/app\.bilibili\.com\/x\/v2\/splash\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/app\.bilibili\.com\/x\/v2\/account\/teenagers\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

[Script]
# ── 哔哩哔哩（app2smile 脚本仍在维护） ──
B站_核心净化 = type=http-response, pattern=^https?:\/\/app\.bilibili\.com\/x\/v2\/(splash|feed|rank|search|account), requires-body=true, script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili.js

# ── 优酷（墨鱼 ddgksf2013 替代脚本，需卸载重装优酷 App） ──
优酷_核心净化 = type=http-response, pattern=^https?:\/\/.*\.youku\.com\/.*, requires-body=true, script-path=https://gist.githubusercontent.com/ddgksf2013/5b431857f8b88acbc7ac2453a21e676a/raw/youku.adblock.js

[MITM]
# Egern 原生写法，已移除%APPEND%并精简
hostname = *.qq.com, *.iqiyi.com, *.youku.com, *.mgtv.com, *.bilibili.com