[Map Local]
# ── YouTube (Music) 广告流拦截 ──
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad data-type=text data="" status-code=200 header="Content-Type:text/plain"

# ── 腾讯视频 ──
^https?:\/\/livew\.l\.qq\.com\/livemsg\? data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/ad\.qq\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 爱奇艺 ──
^https?:\/\/ifacelog\.iqiyi\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/dash-api\.iqiyi\.com\/mac\/api\/ad\/ data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/vali\.cp31\.ott\.cibntv\.net\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 优酷 ──
^https?:\/\/ykad-data\.youku\.com\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── 芒果TV ──
^https?:\/\/app\.mgtv\.com\/v1\/splash\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

# ── B站 ──
^https?:\/\/app\.bilibili\.com\/x\/v2\/splash\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"
^https?:\/\/app\.bilibili\.com\/x\/v2\/account\/teenagers\/.* data-type=text data="{}" status-code=200 header="Content-Type:application/json"

[Script]
# ── B站 ──
B站_JSON净化 = type=http-response, pattern=^https:\/\/app\.bilibili\.com\/x\/(v2\/(splash\/(list|show)|feed\/index\?)|resource\/show\/tab\/v2), requires-body=true, max-size=-1, timeout=20, script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili-json.js
B站_Proto净化 = type=http-response, pattern=^https:\/\/(grpc\.biliapi\.net|app\.bilibili\.com)\/bilibili\.app\.(view\.v1\.View\/View|dynamic\.v2\.Dynamic\/DynAll|playurl\.v1\.PlayURL\/PlayView)$, requires-body=true, binary-body-mode=true, max-size=-1, timeout=20, script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili-proto.js

# ── 优酷 ──
优酷_核心净化 = type=http-response, pattern=^https?:\/\/.*\.youku\.com\/(v3\/play\/ad|v5\/play\/ad|adn\/(p|x)lay|api\/ad|play\/preroll|live\/ad)\/.*, requires-body=true, max-size=-1, timeout=20, script-path=https://gist.githubusercontent.com/ddgksf2013/5b431857f8b88acbc7ac2453a21e676a/raw/youku.adblock.js

# ── YouTube (Music) Enhance ──
# YTM_Request 为 YTM 正常工作必要前置
YTM_Request = type=http-request, pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence)(\?(.*))?$, requires-body=true, binary-body-mode=true, max-size=-1, timeout=20, script-path=https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js
YTM_Enhance = type=http-response, pattern=^https:\/\/youtubei\.googleapis\.com\/(youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch))(\?(.*))?$, requires-body=true, binary-body-mode=true, max-size=-1, timeout=20, argument={"lyricLang":"off","captionLang":"off","blockUpload":true,"blockImmersive":true,"blockShorts":false,"debug":false}, script-path=https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js

[MITM]
hostname = *.iqiyi.com, *.youku.com, *.mgtv.com, *.bilibili.com, grpc.biliapi.net, i0.hdslb.com, youtubei.googleapis.com, *.googlevideo.com, *.netflix.com, *.disneyplus.com, *.disney.com, *.max.com, *.hbomax.com
