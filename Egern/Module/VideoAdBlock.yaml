#!name=流媒体去广告
#!desc=2026.04.05 | 净化爱奇艺、优酷、腾讯视频、芒果TV及B站
#!author=RuCu6, ddgksf2013, app2smile
#!homepage=https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Module/VideoAdBlock.yaml

[Rule]

# ── 腾讯视频 ──
DOMAIN,adsmind.gdtimg.com,REJECT
DOMAIN,tmead.y.qq.com,REJECT
DOMAIN,btrace.qq.com,REJECT
DOMAIN,btrace.video.qq.com,REJECT
DOMAIN,advideo.qq.com,REJECT
DOMAIN,ad.qq.com,REJECT

# ── 爱奇艺 ──
DOMAIN,t7z.cupid.iqiyi.com,REJECT
DOMAIN,t7z.cupid.ptqy.gitv.tv,REJECT
DOMAIN,msg.iqiyi.com,REJECT
DOMAIN,cupid.iqiyi.com,REJECT
DOMAIN,ad.iqiyi.com,REJECT

# ── 优酷视频 ──
DOMAIN,ad.m.youku.com,REJECT
DOMAIN,val.youku.com,REJECT
DOMAIN,lstat.youku.com,REJECT
DOMAIN,ykad.youku.com,REJECT

# ── 芒果 TV ──
DOMAIN,da.mgtv.com,REJECT
DOMAIN,x-da.mgtv.com,REJECT
DOMAIN,ad.mgtv.com,REJECT

# ── 哔哩哔哩（仅拦截广告子域，核心接口 app/api.bilibili.com 不动） ──
DOMAIN,mall.bilibili.com,REJECT
DOMAIN,cm.bilibili.com,REJECT

[Map Local]

# ── 腾讯视频（开屏/弹窗/日志） ──
^https?:\/\/livew\.l\.qq\.com\/livemsg\? data-type=text data="{}" status-code=200
^https?:\/\/ad\.qq\.com\/.* data-type=text data="{}" status-code=200

# ── 爱奇艺（开屏/日志/广告接口） ──
^https?:\/\/ifacelog\.iqiyi\.com\/.* data-type=text data="{}" status-code=200
^https?:\/\/dash-api\.iqiyi\.com\/mac\/api\/ad\/ data-type=text data="{}" status-code=200
^https?:\/\/cupid\.iqiyi\.com\/.* data-type=text data="{}" status-code=200

# ── 优酷视频（启动/广告数据） ──
^https?:\/\/vali\.cp31\.ott\.cibntv\.net\/.* data-type=text data="{}" status-code=200
^https?:\/\/ykad-data\.youku\.com\/.* data-type=text data="{}" status-code=200
^https?:\/\/ad\.m\.youku\.com\/.* data-type=text data="{}" status-code=200

# ── 芒果 TV（开屏/广告） ──
^https?:\/\/app\.mgtv\.com\/v1\/splash\/.* data-type=text data="{}" status-code=200
^https?:\/\/ad\.mgtv\.com\/.* data-type=text data="{}" status-code=200

# ── 哔哩哔哩（开屏/青少年模式弹窗） ──
^https?:\/\/app\.bilibili\.com\/x\/v2\/splash\/.* data-type=text data="{}" status-code=200
^https?:\/\/app\.bilibili\.com\/x\/v2\/account\/teenagers\/.* data-type=text data="{}" status-code=200

[Script]

# ── 腾讯视频 ──
腾讯视频_核心净化 = type=http-response, pattern=^https?:\/\/vd\.l\.qq\.com\/proxyhttp, requires-body=true, script-path=https://raw.githubusercontent.com/RuCu6/QuanX/main/Scripts/tencentvideo.js

# ── 爱奇艺（收窄至已知广告接口，避免全域名拦截） ──
爱奇艺_核心净化 = type=http-response, pattern=^https?:\/\/(cupid|ad|ifacelog)\.iqiyi\.com\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/RuCu6/QuanX/main/Scripts/iqiyi.js

# ── 优酷视频（收窄至已知广告接口，避免全域名拦截） ──
优酷_核心净化 = type=http-response, pattern=^https?:\/\/(ykad|ad\.m|val)\.youku\.com\/.*, requires-body=true, script-path=https://raw.githubusercontent.com/RuCu6/QuanX/main/Scripts/youku.js

# ── 哔哩哔哩（精确匹配广告相关路径，避免误伤核心接口） ──
B站_核心净化 = type=http-response, pattern=^https?:\/\/app\.bilibili\.com\/x\/v2\/(splash|feed\/index|rank\/region|search|account\/myinfo), requires-body=true, script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili.js

[MITM]
hostname = *.qq.com, *.iqiyi.com, *.youku.com, *.mgtv.com, app.bilibili.com, cm.bilibili.com