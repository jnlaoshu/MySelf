# ── 闲鱼 / 关注 Feed 仅保留商品卡片（cardType=2001）──
http-response-jq ^https:\/\/acs\.m\.goofish\.com\/gw\/mtop\.taobao\.idle\.fun\.follow\.feed\.list\/ '.data.sections|=map(select(.cardType==2001))'

# ── 闲鱼 / 社区 Feed 仅保留商品卡与内容卡 ──
