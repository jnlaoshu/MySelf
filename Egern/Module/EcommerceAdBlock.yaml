[Rewrite]
# ================= JQ 数据处理 =================
# 快手
http-response-jq ^https:\/\/.*\.(ksapisrv|gifshow)\.com\/rest\/n\/(reskinConfig|sidebarExSquareStyle) 'delpaths([["reskinConfig"],["sidebarExSquareStyle","moreList"],["sidebarExSquareStyle","topList"]]) | .data.sidebarExSquareStyle.commonlyUsedList? |= map(select(.title as $t | $t != "设置" and $t != "历史记录" and $t != "草稿箱" and $t != "我的钱包" and $t != "小程序" and $t != "未成年人模式" and $t != "官方客服" and $t != "内容偏好" and $t != "离线模式" and $t != "稍后再看" and $t != "举报中心" and $t != "挂件"))'
http-response-jq ^https:\/\/.*\.(ksapisrv|gifshow)\.com\/rest\/n\/live\/feed\/square\/refresh 'del(.data.banners)'
http-response-jq ^https:\/\/.*\.(ksapisrv|gifshow)\.com\/rest\/n\/feed\/(selection|selectionFast) '.data.items? |= map(select(.ad != true))'
http-response-jq ^https:\/\/.*\.(ksapisrv|gifshow)\.com\/rest\/n\/user\/profile\/v2 'del(.data.postRecommends)'

# 拼多多
http-response-jq ^https:\/\/api\.pinduoduo\.com\/api\/alexa\/homepage\/hub\? 'delpaths([["result","dy_module","irregular_banner_dy"],["result","icon_set"],["result","search_bar_hot_query"]]) | .result.bottom_tabs? |= map(select(.link | IN("index.html", "chat_list.html", "personal.html")))'
http-response-jq ^https:\/\/api\.pinduoduo\.com\/api\/philo\/personal\/hub\? 'delpaths([["monthly_card_entrance"],["personal_center_style_v2_vo"],["icon_set","icons"],["icon_set","top_personal_icons"]])'

# 闲鱼
http-response-jq ^https:\/\/acs\.m\.goofish\.com\/gw\/mtop\.taobao\.idlehome\.home\.nextfresh\/ '.data.homeTopList |= map(select(.sectionType == "kingkongDo")) | .data.sections |= map(select((.data.clickParam.args.cardType as $ct | $ct != "homeMultiBanner" and $ct != "mamaAD")))'

# 美团
http-response-jq ^https:\/\/rms\.meituan\.com\/api\/v\d\/rmsmina\/c\/queryShopPortalInfo\? 'delpaths([["data","popUpWindows"]])'

[Script]
# JD 去广告脚本
JD_Script = type=http-response, pattern=^https:\/\/(api|jxapi)\.m\.jd\.com\/client\.action\?functionId=(deliverLayer|getTabHomeInfo|myOrderInfo|orderTrackBusiness|personinfoBusiness|start|welcomeHome), script-path=https://kelee.one/Resource/JavaScript/JD/JD_remove_ads.js, requires-body=true

# 淘宝/闲鱼 去广告脚本
Taobao_Script_1 = type=http-response, pattern=^https:\/\/guide-acs\.m\.taobao\.com\/gw\/mtop\.taobao\.(cloudvideo\.video\.query|wireless\.home\.splash\.awesome\.get), script-path=https://kelee.one/Resource/JavaScript/Taobao/Taobao_remove_ads.js, requires-body=true
Taobao_Script_2 = type=http-response, pattern=^https:\/\/poplayer\.template\.alibaba\.com\/\w+\.json, script-path=https://kelee.one/Resource/JavaScript/Taobao/Taobao_remove_ads.js, requires-body=true

[MITM]
hostname = *.pinduoduo.com, *.jd.com, *.taobao.com, *.tmall.com, *.alicdn.com, *.goofish.com, *.meituan.com, *.dianping.com, *.elemecdn.com, *.xiaohongshu.com, *.dewu.com, *.suning.com, *.gifshow.com, *.ksapisrv.com, acs.m.tmall.com, guide-acs.m.taobao.com, poplayer.template.alibaba.com