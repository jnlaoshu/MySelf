# ==========================================
# 📌 配置文件: 𝐄𝐠𝐞𝐫𝐧@𝐥𝐚𝐨𝐬𝐡𝐮专用配置
# ✨ 特色功能: 集成了智能 DNS 劫持与分流、自动测速节点筛选、精细化的应用路由策略（涵盖 AIGC、流媒体及常用服务）、全面的广告拦截规则，并无缝接入多款实用模块（如小组件合集、Sub-Store 等）。
# ⚠️ 版本要求: 建议使用 Egern TestFlight 2.17.0 (727) 或更高版本以获得最佳兼容性与体验。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Profile.yaml
# ⏱️ 更新时间: 2026-03-15 18:28
# ==========================================

# 自动更新配置 (如需启用请取消注释)
# auto_update:
#   url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Profile.yaml
#   interval: 86400

# --- 基础配置 ---
ipv6: false
http_port: 3080
socks_port: 3090
allow_external_connections: true
vif_only: true
hide_vpn_icon: true

# --- DNS 劫持 ---
hijack_dns:
  - '*:53'

# --- 数据库 ---
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

# --- 延迟测试 ---
proxy_latency_test_url: http://www.gstatic.com/generate_204
direct_latency_test_url: http://www.apple.com/library/test/success.html

# --- 路由选项 ---
compat_route: false
include_all_networks: false
include_apns: false
include_cellular_services: false
include_local_networks: false

# --- DNS 配置 ---
dns:
  bootstrap:
    - 223.5.5.5
    - 119.29.29.29
  upstreams:
    AliDNS:
      - h3://dns.alidns.com/dns-query
    DNSPod:
      - https://doh.pub/dns-query
    ByteDance:
      - 180.184.1.1
      - 180.184.2.2
    Default:
      - https://doh.pub/dns-query
      - h3://dns.alidns.com/dns-query
  forward:
    # 阿里系走阿里 DNS
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Alibaba/Alibaba.list
        value: AliDNS
    # 腾讯系走腾讯 DNS
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Tencent/Tencent.list
        value: DNSPod
    # 字节跳动系走火山引擎自建 DNS
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ByteDance/ByteDance.list
        value: ByteDance
    # 系统与局域网兜底
    - domain_suffix:
        match: local
        value: system
    - domain_suffix:
        match: lan
        value: system
    - domain_suffix:
        match: router.asus.com
        value: system
    # 最终兜底 
    - domain_wildcard:
        match: '*'
        value: Default
  public_ip_lookup_url: https://ifconfig.me/ip

# --- 策略组 ---
policy_groups:
  # 1. 自动测速节点 (地区分类)
  - auto_test:
      name: 香港节点
      policies: [全部节点]
      flatten: true
      filter: "🇭🇰|香港|Hong\\s*Kong|HongKong|HK(?!G)|HKG"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HongKong.png
  - auto_test:
      name: 美国节点
      policies: [全部节点]
      flatten: true
      filter: "🇺🇸|美国|United\\s*States|USA|US(?!A)|States|American"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/UnitedStates.png
  - auto_test:
      name: 台湾节点
      policies: [全部节点]
      flatten: true
      filter: "🇹🇼|台湾|Taiwan|TW(?!N)|Tai|TWN"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Taiwan.png
  - auto_test:
      name: 日本节点
      policies: [全部节点]
      flatten: true
      filter: "🇯🇵|日本|Japan|JP(?!N)|JPN"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Japan.png
  - auto_test:
      name: 狮城节点
      policies: [全部节点]
      flatten: true
      filter: "🇸🇬|新加坡|狮城|Singapore|SG(?!P)|SGP"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Singapore.png
  - auto_test:
      name: 韩国节点
      policies: [全部节点]
      flatten: true
      filter: "🇰🇷|韩国|Korea|KR(?!W)|KOR"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png

  # 2. 节点筛选与来源
  - select:
      name: 其他节点
      policies: [全部节点]
      flatten: true
      filter: "^(?!.*(🇭🇰|香港|Hong\\s*Kong|HongKong|HK(?!G)|HKG|🇺🇸|美国|United\\s*States|USA|US(?!A)|States|American|🇹🇼|台湾|Taiwan|TW(?!N)|Tai|TWN|🇯🇵|日本|Japan|JP(?!N)|JPN|🇸🇬|新加坡|狮城|Singapore|SG(?!P)|SGP|🇰🇷|韩国|Korea|KR(?!W)|KOR)).*$"
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WorldMap.png
  - external:
      name: 全部节点
      type: select
      urls:
        - https://sub.store/download/collection/AllServer?target=Egern
      icon: 🌹

  # 3. 自动测速优选
  - auto_test:
      name: 自动优选
      policies: [全部节点]
      flatten: true
      interval: 600
      tolerance: 50
      icon: ⚡️

  # 4. 核心策略组 (手动选择入口)
  - select:
      name: 自选策略
      policies: [自动优选, 香港节点, 美国节点, 狮城节点, 台湾节点, 日本节点, 韩国节点, 其他节点, DIRECT]
      icon: 😜

  # 5. 常用服务分流策略 (A-Z 排序)
  - select:
      name: AIGC
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/ChatGPT.png
  - select:
      name: Bing
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Bing.png
  - select:
      name: Disney
      policies: [狮城节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Disney.png
  - select:
      name: GitHub
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/GitHub.png
  - select:
      name: Google
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Google.png
  - select:
      name: HBO
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HBO.png
  - select:
      name: Microsoft
      policies: [DIRECT, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Microsoft.png
  - select:
      name: Netflix
      policies: [狮城节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Netflix.png
  - select:
      name: PayPal
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/PayPal.png
  - select:
      name: Spotify
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Spotify.png
  - select:
      name: Telegram
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Telegram.png
  - select:
      name: TikTok
      policies: [日本节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/TikTok.png
  - select:
      name: Twitter
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Twitter.png
  - select:
      name: WeChat
      policies: [DIRECT, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WeChat.png
  - select:
      name: YouTubeMusic
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/YouTubeMusic.png
  - select:
      name: YouTube
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/YouTube.png

  # 6. 去广告策略组
  - select:
      name: 猎杀广告
      policies: [REJECT, DIRECT]
      flatten: false
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/AdBlock.png

# --- 规则集 ---
rules:
  # 1. 广告拦截
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AdBlock.yaml
      policy: 猎杀广告

  # 2. 局域网与基础直连
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/Lan.yaml
      policy: DIRECT
  - domain_suffix:
      match: ntp.org
      policy: DIRECT

  # 3. 关键应用分流 (A-Z 排序)
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AIGC.yaml
