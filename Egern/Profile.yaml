# ==================== 路由规则 ====================
rules:
  # 1. 本地网络
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/Lan.yaml
      policy: DIRECT
      update_interval: 604800

  # 2. 广告拦截主规则
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AdBlock.yaml
      policy: 猎杀广告
      update_interval: 86400

  # 3. 核心分流放行
  - domain_keyword: { match: copilot, policy: AIGC }
  - domain_keyword: { match: bing, policy: Bing }
  - domain_keyword: { match: snssdk, policy: DIRECT }
  - domain_keyword: { match: aweme, policy: DIRECT }
  - domain_keyword: { match: amemv, policy: DIRECT }
  - domain_keyword: { match: bytecdn, policy: DIRECT }
  - domain_keyword: { match: toutiao, policy: DIRECT }
  - domain_keyword: { match: douyin, policy: DIRECT }
  - domain_keyword: { match: pstatp, policy: DIRECT }
  - domain_keyword: { match: windowsupdate, policy: DIRECT }
  - domain_keyword: { match: microsoft, policy: DIRECT }
  - domain_keyword: { match: google, policy: Google }
  - domain_keyword: { match: youtube, policy: YouTube }
  - domain_keyword: { match: github, policy: GitHub }
  - domain_keyword: { match: openai, policy: AIGC }
  - domain_keyword: { match: chatgpt, policy: AIGC }
  - domain_keyword: { match: telegram, policy: Telegram }

  # 4. 苹果生态与系统级应用
