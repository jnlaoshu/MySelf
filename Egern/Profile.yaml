  - smart:
      name: 韩国节点
      policies:
        - 代理节点
      flatten: true
      filter: "(?i)(?:🇰🇷|韩国|首尔|仁川|\\b(?:KR|KOR|Korea)\\b)"
      interval: 300
      tolerance: 50
      latency_test_url: http://www.gstatic.com/generate_204
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png

  - select:
      name: 其他节点
      policies:
        - 代理节点
      flatten: true
      filter: "(?i)^(?!.*(?:🇭🇰|香港|\\b(?:HK|Hong)\\b|🇺🇸|美国|洛杉矶|硅谷|西雅图|芝加哥|达拉斯|纽约|迈阿密|休斯顿|亚特兰大|圣何塞|\\b(?:US|United[\\s_-]*States|America)\\b|🇹🇼|台湾|\\b(?:TW|Tai|Taiwan)\\b|🇯🇵|日本|东京|大阪|\\b(?:JP|Japan)\\b|🇸🇬|新加坡|狮城|\\b(?:SG|Singapore)\\b|🇰🇷|韩国|首尔|仁川|\\b(?:KR|KOR|Korea)\\b)).*$"
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WorldMap.png

  - select:
      name: Proxy
      policies:
        - 香港节点
        - 美国节点
        - 狮城节点
        - 台湾节点
        - 日本节点
        - 韩国节点
        - 其他节点
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Proxy.png

  # ==================== AI ====================

