# ==================== MITM 配置 ====================
mitm:
  ca_p12: egern.p12
  ca_passphrase: egern
  hostnames:
    excludes:
      - "*.wechat.com"
      - "*.weixin.com"
      - "*.alipay.com"
      - "*.microsoft.com"
      - "*.live.com"
      - "*.office.com"
      - "*.apple.com"
      - "*.icloud.com"
      - "*.amazonaws.com"
      - "*.githubassets.com"
      - "*.gstatic.com"
      - "*.akamai.net"
    includes:
      - raw.githubusercontent.com
      - gist.githubusercontent.com
      - github.com
      - "*.github.com"

