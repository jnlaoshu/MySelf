# ==================== 路由规则 ====================

rules:
  # 1. 局域网
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/Lan.yaml
      policy: DIRECT
      update_interval: 604800

  # 2. 核心直连白名单
  - domain_keyword: { match: snssdk, policy: DIRECT }
  - domain_keyword: { match: aweme, policy: DIRECT }
  - domain_keyword: { match: amemv, policy: DIRECT }
  - domain_keyword: { match: bytecdn, policy: DIRECT }
  - domain_keyword: { match: toutiao, policy: DIRECT }
  - domain_keyword: { match: douyin, policy: DIRECT }
  - domain_keyword: { match: pstatp, policy: DIRECT }
  - domain_keyword: { match: kuaishou, policy: DIRECT }
  - domain_keyword: { match: gifshow, policy: DIRECT }
  - domain_keyword: { match: yximgs, policy: DIRECT }

  - domain_suffix:
      match: edith.xiaohongshu.com
      policy: DIRECT

  - domain_suffix:
      match: www.xiaohongshu.com
      policy: DIRECT

  # 3. OCSP
  - domain_suffix:
      match: ocsp.apple.com
      policy: DIRECT

  - domain_suffix:
      match: ocsp2.apple.com
      policy: DIRECT

  # 4. Apple 系统服务
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/Apple.yaml
      policy: DIRECT
      update_interval: 604800

  # 5. 广告拦截
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AdBlock.yaml
      policy: 猎杀广告
      update_interval: 86400

  # 6. AI 服务
  - domain_keyword:
      match: copilot
      policy: AIGC

  - domain_keyword:
      match: openai
      policy: ChatGpt

  - domain_keyword:
      match: chatgpt
      policy: ChatGpt

  - domain_keyword:
      match: anthropic
      policy: Claude

  - domain_keyword:
      match: claude
      policy: Claude

  - domain_suffix:
      match: gemini.google.com
      policy: Gemini

  - domain_suffix:
      match: aistudio.google.com
      policy: Gemini

  - domain_suffix:
      match: generativelanguage.googleapis.com
      policy: Gemini

  - domain_suffix:
      match: x.ai
      policy: Grok

  - domain_keyword:
      match: grok
      policy: Grok

  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AIGC.yaml
      policy: AIGC
      update_interval: 604800

  # 7. Google
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list
      policy: Google
      update_interval: 604800

  # 8. Microsoft / Bing / GitHub
  - domain_keyword:
      match: bing
      policy: Bing

  - domain_keyword:
      match: windowsupdate
      policy: DIRECT

  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list
      policy: Microsoft
      update_interval: 604800

  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Bing/Bing.list
      policy: Bing
      update_interval: 604800

  - domain_suffix:
      match: github.com
      policy: GitHub

  - domain_suffix:
      match: github.io
      policy: GitHub

  - domain_suffix:
      match: githubusercontent.com
      policy: GitHub

  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitHub/GitHub.list
      policy: GitHub
      update_interval: 604800

  # 9. 流媒体与社交
  - domain_suffix:
      match: youtube.com
