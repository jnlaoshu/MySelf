        match: aliyun.com
        value: AliDNS
    - domain_suffix:
        match: taobao.com
        value: AliDNS
    - domain_suffix:
        match: tmall.com
        value: AliDNS
    - domain_suffix:
        match: dingtalk.com
        value: AliDNS
    - domain_suffix:
        match: 1688.com
        value: AliDNS
    - domain_suffix:
        match: youku.com
        value: AliDNS
    - domain_suffix:
        match: uc.cn
        value: AliDNS
    - domain_suffix:
        match: amap.com
        value: AliDNS
    - domain_suffix:
        match: ele.me
        value: AliDNS
    - domain_suffix:
        match: hichina.com
        value: AliDNS
    - domain_suffix:
        match: alibabacloud.com
        value: AliDNS
    # 腾讯系
    - domain_suffix:
        match: qq.com
        value: DNSPod
    - domain_suffix:
        match: tencent.com
        value: DNSPod
    - domain_suffix:
        match: wechat.com
        value: DNSPod
    - domain_suffix:
        match: qpic.cn
        value: DNSPod
    - domain_suffix:
        match: qlogo.cn
        value: DNSPod
    - domain_suffix:
        match: gtimg.com
        value: DNSPod
    - domain_suffix:
        match: qcloud.com
        value: DNSPod
    - domain_suffix:
        match: wegame.com
        value: DNSPod
    # 字节跳动系
    - domain_suffix:
        match: bytedance.com
        value: ByteDance
    - domain_suffix:
        match: byteimg.com
        value: ByteDance
    - domain_suffix:
        match: douyinvod.com
        value: ByteDance
    - domain_suffix:
        match: douyin.com
        value: ByteDance
    - domain_suffix:
        match: toutiao.com
        value: ByteDance
    - domain_suffix:
        match: bdurl.net
        value: ByteDance
    - domain_suffix:
        match: bytecdn.cn
        value: ByteDance
    - domain_suffix:
        match: feishu.cn
        value: ByteDance
    - domain_suffix:
        match: larksuite.com
        value: ByteDance
    - domain_suffix:
        match: ixigua.com
        value: ByteDance
    - domain_suffix:
        match: capcut.com
        value: ByteDance
