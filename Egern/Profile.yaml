# ==========================================
# 📌 配置文件: 𝐄𝐠𝐞𝐫𝐧@𝐥𝐚𝐨𝐬𝐡𝐮 专用配置
# ✨ 主要功能: 
#    1. 智能 DNS 劫持与精细化企业定向解析（结合核心后缀原生直通与远程规则兜底，完美规避 iOS 内存限制漏网）。
#    2. 节点自动测速与按地区正则筛分，构建自动化高可用代理池。
#    3. 漏斗型分层路由机制（去广告强拦截 > 局域网系统直连 > 应用级代理分流 > 国内宽泛直连兜底）。
#    4. 模块化接入外部增强配置（去广告脚本、功能小组件等）。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Profile.yaml
# ⏱️ 更新时间: 2026.03.21 22:15
# ==========================================

# --- 基础网络设置 ---
ipv6: false
http_port: 3080
socks_port: 3090
allow_external_connections: true
vif_only: true
hide_vpn_icon: true

# --- DNS 劫持 ---
hijack_dns:
  - '*:53'

# --- 数据库更新 ---
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

# --- 延迟测试基准 ---
proxy_latency_test_url: http://www.gstatic.com/generate_204
direct_latency_test_url: http://www.apple.com/library/test/success.html

# --- 网络兼容选项 ---
compat_route: false
include_all_networks: false
include_apns: false
include_cellular_services: false
include_local_networks: false

# --- DNS 解析策略 ---
dns:
  bootstrap:
    - system
    - 223.5.5.5
    - 119.29.29.29
  upstreams:
    AliDNS:
      - h3://dns.alidns.com/dns-query
    DNSPod:
      - https://doh.pub/dns-query
    ByteDance:
      - 180.184.1.1
      - 180.184.2.2
    Default:
      - https://doh.pub/dns-query
      - h3://dns.alidns.com/dns-query
  forward:
    # 1. 核心高频后缀“极速直通车”（防远程列表过大导致内存溢出漏网）
    - domain_suffix:
        match: taobao.com
        value: AliDNS
    - domain_suffix:
        match: alipay.com
        value: AliDNS
    - domain_suffix:
        match: alicdn.com
        value: AliDNS
    - domain_suffix:
        match: qq.com
        value: DNSPod
    - domain_suffix:
        match: tencent.com
        value: DNSPod
    - domain_suffix:
        match: qpic.cn
        value: DNSPod
    - domain_suffix:
        match: qcloud.com
        value: DNSPod
    - domain_suffix:
        match: snssdk.com
        value: ByteDance
    - domain_suffix:
        match: douyinvod.com
        value: ByteDance

    # 2. 远程规则集兜底边缘子域名
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Alibaba/Alibaba.list
        value: AliDNS
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Tencent/Tencent.list
        value: DNSPod
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ByteDance/ByteDance.list
        value: ByteDance

    # 3. 本地与网关域名交由系统 DNS 解析
    - domain_suffix:
        match: local
        value: system
    - domain_suffix:
        match: lan
        value: system
    - domain_suffix:
        match: router.asus.com
        value: system

    # 4. 全局兜底 DNS
    - domain_wildcard:
        match: '*'
        value: Default

# --- 策略组配置 ---
policy_groups:
  # [外部节点源]
  - external:
      name: 全部节点
      type: select
      urls:
        - https://sub.store/download/collection/AllServer?target=Egern
      icon: 🌹

  # [全局测速组]
  - auto_test:
      name: 自动优选
      policies: [全部节点]
      flatten: true
      interval: 600
      tolerance: 50
      icon: ⚡️

  # [地区正则筛选测速组]
  - auto_test:
      name: 香港节点
      policies: [全部节点]
      flatten: true
      filter: "🇭🇰|香港|Hong\\s*Kong|HK"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HongKong.png
  - auto_test:
      name: 美国节点
      policies: [全部节点]
      flatten: true
      filter: "🇺🇸|美国|United\\s*States|US|States|American"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/UnitedStates.png
  - auto_test:
      name: 台湾节点
      policies: [全部节点]
      flatten: true
      filter: "🇹🇼|台湾|Taiwan|TW|Tai"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Taiwan.png
  - auto_test:
      name: 日本节点
      policies: [全部节点]
      flatten: true
      filter: "🇯🇵|日本|Japan|JP"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Japan.png
  - auto_test:
      name: 狮城节点
      policies: [全部节点]
      flatten: true
      filter: "🇸🇬|新加坡|狮城|Singapore|SG"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Singapore.png
  - auto_test:
      name: 韩国节点
      policies: [全部节点]
      flatten: true
      filter: "🇰🇷|韩国|Korea|KR|KOR"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png
  - select:
      name: 其他节点
      policies: [全部节点]
      flatten: true
      filter: "^(?!.*(🇭🇰|香港|Hong\\s*Kong|HK|🇺🇸|美国|United\\s*States|US|States|American|🇹🇼|台湾|Taiwan|TW|Tai|🇯🇵|日本|Japan|JP|🇸🇬|新加坡|狮城|Singapore|SG|🇰🇷|韩国|Korea|KR|KOR)).*$"
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WorldMap.png

  # [主干汇聚手动干预入口]
  - select:
      name: 自选策略
      policies: [自动优选, 香港节点, 美国节点, 狮城节点, 台湾节点, 日本节点, 韩国节点, 其他节点, DIRECT]
      icon: 😜

  # [应用代理定向分流组]
  - select:
      name: AIGC
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/ChatGPT.png
  - select:
      name: Bing
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Bing.png
  - select:
      name: Disney
      policies: [狮城节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Disney.png
  - select:
      name: HBO
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HBO.png
  - select:
      name: Netflix
      policies: [狮城节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Netflix.png
  - select:
      name: Spotify
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Spotify.png
  - select:
      name: TikTok
      policies: [日本节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/TikTok.png
  - select:
      name: YouTubeMusic
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/YouTubeMusic.png
  - select:
      name: YouTube
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/YouTube.png
  - select:
      name: GitHub
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/GitHub.png
  - select:
      name: Google
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Google.png
  - select:
      name: Microsoft
      policies: [DIRECT, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Microsoft.png
  - select:
      name: PayPal
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/PayPal.png
  - select:
      name: Telegram
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Telegram.png
  - select:
      name: Twitter
      policies: [香港节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Twitter.png
  - select:
      name: WeChat
      policies: [DIRECT, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WeChat.png

  # [功能控制组]
  - select:
      name: 猎杀广告
      policies: [REJECT, DIRECT]
      flatten: false
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/AdBlock.png

# --- 路由分流规则 ---
# 匹配引擎执行逻辑：自上而下，匹配即停 (漏斗模型)
rules:
  # 1. 广告拦截（黑名单绝对优先）
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AdBlock.yaml
      policy: 猎杀广告

  # 2. 局域网、NTP 与 Apple 系统核心直连
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/Lan.yaml
      policy: DIRECT
  - domain_suffix:
      match: ntp.org
      policy: DIRECT
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple.list
      policy: DIRECT

  # 3. AIGC 与 AI 引擎代理分流
  - rule_set:
      match: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/Egern/Rule/AIGC.yaml
      policy: AIGC
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Bing/Bing.list
      policy: Bing

  # 4. 国际流媒体矩阵代理分流
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Disney/Disney.list
      policy: Disney
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/HBO/HBO.list
      policy: HBO
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list
      policy: Netflix
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Spotify/Spotify.list
      policy: Spotify
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list
      policy: TikTok
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTubeMusic/YouTubeMusic.list
      policy: YouTubeMusic
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list
      policy: YouTube

  # 5. 生产力与社交工具代理分流
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitHub/GitHub.list
      policy: GitHub
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list
      policy: Google
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list
      policy: Microsoft
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PayPal/PayPal.list
      policy: PayPal
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list
      policy: Telegram
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Twitter/Twitter.list
      policy: Twitter
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/WeChat/WeChat.list
      policy: WeChat

  # 6. 国内流媒体独立直连引擎
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/KuGou/KuGou.list
      policy: DIRECT
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/KuwoMusic/KuwoMusic.list
      policy: DIRECT
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Ximalaya/Ximalaya.list
      policy: DIRECT

  # 7. 国内宽泛直连兜底 (拦截国内流量误穿透)
  - rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax.list
      policy: DIRECT
  - domain_suffix:
      match: cn
      policy: DIRECT
  - geoip:
      match: CN
      policy: DIRECT
      no_resolve: true

  # 8. 全局最终代理兜底
  - default:
      policy: 自选策略

# --- MITM 证书设置 ---
