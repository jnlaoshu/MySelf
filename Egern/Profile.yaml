# 策略组
policy_groups:
  - external:
      name: 全部节点
      type: select
      urls:
        - https://sub.store/download/collection/AllServer?target=Egern
      icon: 🌹
  - auto_test:
      name: 香港节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇭🇰|香港|Hong\\s*Kong|\\bHKG?\\b|(?:深|沪|京|广)港"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HongKong.png
  - auto_test:
      name: 美国节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇺🇸|美国|United\\s*States|America|\\bUSA?\\b|洛杉矶|硅谷|西雅图|芝加哥|达拉斯|凤凰城|阿什本|纽约|迈阿密|波士顿|休斯顿|亚特兰大|拉斯维加斯|圣地亚哥|盐湖城|奥斯汀|波特兰|丹佛|奥克兰|安大略|圣安娜|\\b(?:LAX|SJC|SFO|SEA|ORD|JFK|DFW|IAD|PHX|ATL|BOS|MIA|EWR|LGA|IAH|HOU|DEN|OAK|ONT|SNA|LAS|PDX|DAL|SAN|SLC|MSP)\\b"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/UnitedStates.png
  - auto_test:
      name: 台湾节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇹🇼|台湾|Taiwan|\\b(?:TWN?|TPE|Taipei)\\b"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Taiwan.png
  - auto_test:
      name: 日本节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇯🇵|日本|东京|大阪|Japan|\\b(?:JPN?|NRT|HND|KIX|FUK|NGO|OSA|CTS|SDJ|OKA)\\b"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Japan.png
  - auto_test:
      name: 狮城节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇸🇬|新加坡|狮城|Singapore|\\b(?:SGP?|SIN)\\b"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Singapore.png
  - auto_test:
      name: 韩国节点
      policies: [全部节点]
      flatten: true
      filter: "(?i)🇰🇷|韩国|首尔|仁川|Korea|South\\s*Korea|\\b(?:KOR|KR|ICN|SEL)\\b"
      interval: 600
      tolerance: 50
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png
  - select:
      name: 其他节点
      policies: [全部节点]
      flatten: true
      filter: >-
        (?xi) ^ (?! .* (?:
          🇭🇰|香港|Hong\s*Kong|\bHKG?\b|(?:深|沪|京|广)港|
          🇯🇵|日本|东京|大阪|Japan|\b(?:JPN?|NRT|HND|KIX|FUK|NGO|OSA|CTS|SDJ|OKA)\b|
          🇸🇬|新加坡|狮城|Singapore|\b(?:SGP?|SIN)\b|
          🇹🇼|台湾|Taiwan|\b(?:TWN?|TPE|Taipei)\b|
          🇰🇷|韩国|首尔|仁川|Korea|South\s*Korea|\b(?:KOR|KR|ICN|SEL)\b|
          🇺🇸|美国|United\s*States|America|\bUSA?\b|
          洛杉矶|硅谷|西雅图|芝加哥|达拉斯|凤凰城|阿什本|纽约|迈阿密|波士顿|休斯顿|亚特兰大|拉斯维加斯|圣地亚哥|盐湖城|奥斯汀|波特兰|丹佛|奥克兰|安大略|圣安娜|
          \b(?:LAX|SJC|SFO|SEA|ORD|JFK|DFW|IAD|PHX|ATL|BOS|MIA|EWR|LGA|IAH|HOU|DEN|OAK|ONT|SNA|LAS|PDX|DAL|SAN|SLC|MSP)\b|
          倍率|剩余|到期|流量|官网|订阅|测试|有效|禁止|邮箱|客服|地址|网站|群组
        ) ) .+ $
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/WorldMap.png
  - select:
      name: 自选策略
      policies: [香港节点, 美国节点, 狮城节点, 台湾节点, 日本节点, 韩国节点, 其他节点, DIRECT]
      icon: 😜
  - select:
      name: AIGC
      policies: [美国节点, 自选策略]
      flatten: true
      icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/ChatGPT.png
  - select:
