# ==========================================
# 📌 模块名称: 岁时黄历 Widget
# ✨ 主要功能: 三尺寸自适应，农历双引擎，支持黄历角标切换与教学周配置。
# 🔗 https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.yaml
# ⏱️ 2026.03.30 10:00
# ==========================================

name: "岁时黄历 Widget"
description: "三尺寸自适应：小号日历风，中/大号经典黄历风。自带农历引擎与宜忌数据。"

auto_update:
  interval: 43200

env_schema:
  ASTRO_OR_WEEK:
    name: 🔮 右上角显示模式
    description: "选择黄历面板右上角是显示星座，还是当年/当月周次"
    options: ["星座", "周次"]
    default_value: "星座"

  SHOW_TEACHING_WEEK:
    name: 📚 全局启用教学周
    description: "开启后，可在面板展示教学周进度。"
    options: ["true", "false"]
    default_value: "true"

  SHOW_TEACHING_WEEK_IN_WEEK:
    name: 🔄 在周次模式下显示教学周
    description: "开启后，即使选择了「周次」，也会在周次文本前强制显示教学周进度。"
    options: ["true", "false"]
    default_value: "true"

  TEACHING_WEEK_START:
    name: 🗓️ 教学周起始日期
    description: "输入本学期第一周周一的日期，格式 YYYY/MM/DD"
    default_value: "2026/03/02"

scriptings:
  - generic:
      name: 岁时黄历
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.js

widgets:
  - name: 岁时黄历
    script_name: 岁时黄历
