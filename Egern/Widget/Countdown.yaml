# ==========================================
# 📌 模块名称: 时光倒数 Widget
# ✨ 主要功能: 智能聚合四类节日，支持置顶排序、周末独立主题、春秋假推算与金融日过滤。
# 🔗 https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.yaml
# ⏱️ 2026.03.28 15:30
# ==========================================

name: "时光倒数 Widget"
description: "三尺寸自适应：小号去重微缩分类，中/大号经典分类列表。支持重点节日置顶与排序。"

auto_update:
  interval: 43200

env_schema:
  PINNED_HOLIDAY:
    name: ✨ 始终置顶节假日
    description: "高亮置顶的节日名称，多个用英文逗号分隔"
    default_value: "高考"

  SHOW_SCHOOL_HOLIDAYS:
    name: 🏫 显示春假和秋假
    options: ["true", "false"]
    default_value: "true"

  SPRING_BREAK_DATE:
    name: 🌸 春假自定义日期
    description: "格式 MM/DD，留空使用内置逻辑"

  AUTUMN_BREAK_DATE:
    name: 🍂 秋假自定义日期
    description: "格式 MM/DD，留空使用内置逻辑"

  SHOW_FINANCE_DATES:
    name: 📈 显示金融交割日
    options: ["true", "false"]
    default_value: "true"

  ENABLE_PRIORITY_SORT:
    name: 🔢 启用优先级排序
    description: "开启后，重点节日（如春节）自动前置"
    options: ["true", "false"]
    default_value: "true"

  ENABLE_EXCLUSIVE_WEIGHT:
    name: ⬆️ 提高专属纪念日权重
    description: "开启后，专属纪念日在同日期竞争时优先展示"
    options: ["true", "false"]
    default_value: "true"

  ENABLE_WEEKEND_THEME:
    name: 🎨 周末蓝调背景
    options: ["true", "false"]
    default_value: "true"

  SMALL_FORCE_FOUR_ROWS:
    name: 📐 小号补足四行
    description: "小号尺寸自动从各类别补位，尽量保持四行展示"
    options: ["true", "false"]
    default_value: "true"

  EXCLUSIVE_NAME_1:
    name: 🎁 专属纪念日 1
    description: "设定最重要的纪念日名称"
    default_value: "我的生日"
  EXCLUSIVE_DATE_1:
    name: 📅 纪念日 1 日期
    description: "日期格式必须严格为 MM/DD"
    default_value: "11/10"

  EXCLUSIVE_NAME_2:
    name: 🎁 专属纪念日 2
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_2:
    name: 📅 纪念日 2 日期
    description: "日期格式必须严格为 MM/DD"

  EXCLUSIVE_NAME_3:
    name: 🎁 专属纪念日 3
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_3:
    name: 📅 纪念日 3 日期
    description: "日期格式必须严格为 MM/DD"

  EXCLUSIVE_NAME_4:
    name: 🎁 专属纪念日 4
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_4:
    name: 📅 纪念日 4 日期
    description: "日期格式必须严格为 MM/DD"

  EXCLUSIVE_NAME_5:
    name: 🎁 专属纪念日 5
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_5:
    name: 📅 纪念日 5 日期
    description: "日期格式必须严格为 MM/DD"

  EXCLUSIVE_NAME_6:
    name: 🎁 专属纪念日 6
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_6:
    name: 📅 纪念日 6 日期
    description: "日期格式必须严格为 MM/DD"

scriptings:
  - generic:
      name: 时光倒数
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.js

widgets:
  - name: 时光倒数
    script_name: 时光倒数
