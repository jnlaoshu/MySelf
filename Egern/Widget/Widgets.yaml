# ==========================================
# 📌 模块名称: Egern 桌面小组件合集
# ✨ 主要功能: 聚合岁时黄历、时光倒数、网络信息、全国油价、服务器监控 5 款核心组件；支持可视化配置 6 节点集群监控参数，配合 YAML 脚本分身实现彻底独立的无缝挂载。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Widgets.yaml
# ⏱️ 更新时间: 2026.03.20 10:00
# ==========================================

name: "Egern 桌面小组件合集"
description: "包含：岁时黄历、时光倒数、网络信息、全国油价，及智能集群服务器监控。"

auto_update:
  interval: 43200

env_schema:
  # --- 🎁 专属纪念日配置 ---
  EXCLUSIVE_NAME_1:
    name: 🎁 专属纪念日 1
    description: "设定最重要的纪念日名称（如：我的生日、结婚纪念日）"
    default_value: "我的生日"
  EXCLUSIVE_DATE_1:
    name: 📅 纪念日 1 日期
    description: "日期格式必须严格为 MM/DD（如：12/13）"
    default_value: "11/10"
  EXCLUSIVE_NAME_2:
    name: 🎁 专属纪念日 2
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_2:
    name: 📅 纪念日 2 日期
    description: "日期格式必须严格为 MM/DD"
  EXCLUSIVE_NAME_3:
    name: 🎁 专属纪念日 3
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_3:
    name: 📅 纪念日 3 日期
    description: "日期格式必须严格为 MM/DD"
  EXCLUSIVE_NAME_4:
    name: 🎁 专属纪念日 4
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_4:
    name: 📅 纪念日 4 日期
    description: "日期格式必须严格为 MM/DD"
  EXCLUSIVE_NAME_5:
    name: 🎁 专属纪念日 5
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_5:
    name: 📅 纪念日 5 日期
    description: "日期格式必须严格为 MM/DD"
  EXCLUSIVE_NAME_6:
    name: 🎁 专属纪念日 6
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_6:
    name: 📅 纪念日 6 日期
    description: "日期格式必须严格为 MM/DD"

  # --- ✨ 节假日与油价配置 ---
  PINNED_HOLIDAY:
    name: ✨ 始终置顶节假日
    description: "输入你想高亮置顶在顶部的节日名称（默认：高考，倒数 ≤200 天触发）。可根据需要自行修改，留空则关闭置顶。"
    default_value: "高考"
  SHOW_SCHOOL_HOLIDAYS:
    name: 🏫 显示春假和秋假
    description: "是否在法定节假日列表中显示“春假”和“秋假”的倒数"
    options:
      - "true"
      - "false"
    default_value: "true"
  SPRING_BREAK_DATE:
    name: 🌸 春假自定义日期
    description: "格式 MM/DD。留空则默认使用系统内置的成都春假推算逻辑"
    default_value: ""
  AUTUMN_BREAK_DATE:
    name: 🍂 秋假自定义日期
    description: "格式 MM/DD。留空则默认使用系统内置的成都秋假推算逻辑"
    default_value: ""
  GAS_REGION:
    name: 📍 油价查询地区
    description: "直辖市输入拼音(如beijing)；其他省份输入省份/省会拼音(如sichuan/chengdu)。"
    default_value: "sichuan/chengdu"

  # ==================================
  # 🖥️ 智能集群服务器探针配置
  # ==================================
  
  # --- 节点 1 ---
  SSH1_NAME:
    name: 🏷️ [节点1] 显示名称
    default_value: "Oracle"
  SSH1_HOST:
    name: 🌐 [节点1] IP / 域名
    default_value: ""
  SSH1_PORT:
    name: 🔌 [节点1] 端口
    default_value: "22"
  SSH1_USER:
    name: 👤 [节点1] 用户名
    default_value: "root"
  SSH1_PWD:
    name: 🔐 [节点1] 密码
    default_value: ""
  SSH1_KEY:
    name: 🔑 [节点1] 私钥
    default_value: ""

  # --- 节点 2 ---
  SSH2_NAME:
    name: 🏷️ [节点2] 显示名称
    default_value: "Tencent"
  SSH2_HOST:
    name: 🌐 [节点2] IP / 域名
    default_value: ""
  SSH2_PORT:
    name: 🔌 [节点2] 端口
    default_value: "22"
  SSH2_USER:
    name: 👤 [节点2] 用户名
    default_value: "root"
  SSH2_PWD:
    name: 🔐 [节点2] 密码
    default_value: ""
  SSH2_KEY:
    name: 🔑 [节点2] 私钥
    default_value: ""

  # --- 节点 3 ---
  SSH3_NAME:
    name: 🏷️ [节点3] 显示名称
    default_value: ""
  SSH3_HOST:
    name: 🌐 [节点3] IP / 域名
    default_value: ""
  SSH3_PORT:
    name: 🔌 [节点3] 端口
    default_value: "22"
  SSH3_USER:
    name: 👤 [节点3] 用户名
    default_value: "root"
  SSH3_PWD:
    name: 🔐 [节点3] 密码
    default_value: ""
  SSH3_KEY:
    name: 🔑 [节点3] 私钥
    default_value: ""

  # --- 节点 4 ---
  SSH4_NAME:
    name: 🏷️ [节点4] 显示名称
    default_value: ""
  SSH4_HOST:
    name: 🌐 [节点4] IP / 域名
    default_value: ""
  SSH4_PORT:
    name: 🔌 [节点4] 端口
    default_value: "22"
  SSH4_USER:
    name: 👤 [节点4] 用户名
    default_value: "root"
  SSH4_PWD:
    name: 🔐 [节点4] 密码
    default_value: ""
  SSH4_KEY:
    name: 🔑 [节点4] 私钥
    default_value: ""

  # --- 节点 5 ---
  SSH5_NAME:
    name: 🏷️ [节点5] 显示名称
    default_value: ""
  SSH5_HOST:
    name: 🌐 [节点5] IP / 域名
    default_value: ""
  SSH5_PORT:
    name: 🔌 [节点5] 端口
    default_value: "22"
  SSH5_USER:
    name: 👤 [节点5] 用户名
    default_value: "root"
  SSH5_PWD:
    name: 🔐 [节点5] 密码
    default_value: ""
  SSH5_KEY:
    name: 🔑 [节点5] 私钥
    default_value: ""

  # --- 节点 6 ---
  SSH6_NAME:
    name: 🏷️ [节点6] 显示名称
    default_value: ""
  SSH6_HOST:
    name: 🌐 [节点6] IP / 域名
    default_value: ""
  SSH6_PORT:
    name: 🔌 [节点6] 端口
    default_value: "22"
  SSH6_USER:
    name: 👤 [节点6] 用户名
    default_value: "root"
  SSH6_PWD:
    name: 🔐 [节点6] 密码
    default_value: ""
  SSH6_KEY:
    name: 🔑 [节点6] 私钥
    default_value: ""

# 🎯 核心魔法 1：强行开辟 6 个独立的脚本分身，都指向同一个 URL
scriptings:
  - generic:
      name: 岁时黄历
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.js
  - generic:
      name: 时光倒数
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.js
  - generic:
      name: 网络信息
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/NetworkInfo.js
  - generic:
      name: 全国油价
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/GasPrice.js
  - generic:
      name: 服务器监控 1
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js
  - generic:
      name: 服务器监控 2
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js
  - generic:
      name: 服务器监控 3
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js
  - generic:
      name: 服务器监控 4
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js
  - generic:
      name: 服务器监控 5
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js
  - generic:
      name: 服务器监控 6
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/ServerMonitor.js

# 🎯 核心魔法 2：将桌面小组件与对应的脚本分身精准绑定
widgets:
  - name: 岁时黄历
    script_name: 岁时黄历
  - name: 时光倒数
    script_name: 时光倒数
  - name: 网络信息
    script_name: 网络信息
  - name: 全国油价
    script_name: 全国油价
  - name: 服务器监控 1
    script_name: 服务器监控 1
  - name: 服务器监控 2
    script_name: 服务器监控 2
  - name: 服务器监控 3
    script_name: 服务器监控 3
  - name: 服务器监控 4
    script_name: 服务器监控 4
  - name: 服务器监控 5
    script_name: 服务器监控 5
  - name: 服务器监控 6
    script_name: 服务器监控 6
