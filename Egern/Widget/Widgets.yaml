# ==========================================
# 📌 模块名称: Egern 小组件合集
# ✨ 特色功能: 包含岁时黄历、时光倒数、网络信息、全国油价 4 款像素级对齐的新中式风格桌面小组件；支持图形化配置专属纪念日与油价查询地区；一键极速安装，全系支持深浅模式自适应。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Widgets.yaml
# ⏱️ 更新时间: 2026.03.17 00.48
# ==========================================

name: "Egern 小组件合集"
description: "包含：岁时黄历、时光倒数、网络信息、全国油价 4 款像素级对齐的新中式风格桌面小组件。"

env_schema:
  EXCLUSIVE_NAME:
    name: 专属纪念日名称
    description: "时光倒数小组件中的专属节日名称，例如：*生日、结婚纪念日"
    default_value: "生日"
  EXCLUSIVE_DATE:
    name: 专属纪念日日期
    description: "格式必须为 MM/DD，例如：12/13 或 05/20"
    default_value: "12/13"
  GAS_REGION:
    name: 油价地区
    description: "全国油价小组件的查询地区拼音，例如：sichuan/chengdu、beijing、shanghai"
    default_value: "sichuan/chengdu"
  SHOW_TREND:
    name: 显示油价趋势
    description: "是否显示底部本轮调价涨跌趋势及预测"
    options:
      - "true"
      - "false"
    default_value: "true"

scriptings:
# 1. 岁时黄历 (节气流转全览版)
- generic:
    name: 岁时黄历
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.js

# 2. 节假日倒计时 (时光倒数)
- generic:
    name: 时光倒数
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.js

# 3. 实时网络信息面板
- generic:
    name: 网络信息
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/NetworkInfo.js

# 4. 全国油价及调价预测 (默认成都)
- generic:
    name: 全国油价
    script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/GasPrice.js

widgets:
- name: 岁时黄历
  script_name: 岁时黄历
- name: 时光倒数
  script_name: 时光倒数
- name: 网络信息
  script_name: 网络信息
- name: 全国油价
  script_name: 全国油价