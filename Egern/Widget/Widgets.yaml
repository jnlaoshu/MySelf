# ==========================================
# 📌 模块名称: Egern 桌面小组件合集
# ✨ 特色功能: 聚合岁时黄历、时光倒数、网络信息、全国油价 4 款核心小组件；提供可视化配置面板，支持自定义多达 6 个专属倒数日、全局置顶特定节假日及指定油价查询地区；底层共享统一色彩与排版规范，内置高容错防崩溃处理机制；支持一键模块化部署，原生适配系统深浅色模式切换。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Widgets.yaml
# ⏱️ 更新时间: 2026.03.18 00:48
# ==========================================

name: "Egern 桌面小组件合集"
description: "包含：岁时黄历、时光倒数、网络信息、全国油价 4 款桌面小组件。"

env_schema:
  # ==================================
  # ⏳ 时光倒数：专属纪念日设置
  # ==================================
  EXCLUSIVE_NAME_1:
    name: 🎁 专属纪念日 1
    description: "设定最重要的纪念日名称（如：我的生日、结婚纪念日）"
    default_value: "我的生日"
  EXCLUSIVE_DATE_1:
    name: 📅 纪念日 1 日期
    description: "日期格式必须严格为 MM/DD（如：12/13）"
    default_value: "12/13"
    
  EXCLUSIVE_NAME_2:
    name: 🎁 专属纪念日 2
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_2:
    name: 📅 纪念日 2 日期
    description: "日期格式必须严格为 MM/DD"
    
  EXCLUSIVE_NAME_3:
    name: 🎁 专属纪念日 3
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_3:
    name: 📅 纪念日 3 日期
    description: "日期格式必须严格为 MM/DD"
    
  EXCLUSIVE_NAME_4:
    name: 🎁 专属纪念日 4
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_4:
    name: 📅 纪念日 4 日期
    description: "日期格式必须严格为 MM/DD"
    
  EXCLUSIVE_NAME_5:
    name: 🎁 专属纪念日 5
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_5:
    name: 📅 纪念日 5 日期
    description: "日期格式必须严格为 MM/DD"
    
  EXCLUSIVE_NAME_6:
    name: 🎁 专属纪念日 6
    description: "留空则不显示该项"
  EXCLUSIVE_DATE_6:
    name: 📅 纪念日 6 日期
    description: "日期格式必须严格为 MM/DD"

  # ==================================
  # ⏳ 时光倒数：进阶偏好设置
  # ==================================
  PINNED_HOLIDAY:
    name: ✨ 始终置顶节假日
    description: "输入你想高亮置顶在顶部的节日名称（如：高考、春节）。留空则关闭置顶。"
    default_value: ""
    
  SHOW_SCHOOL_HOLIDAYS:
    name: 🏫 显示春假和秋假
    description: "是否在法定节假日列表中显示“春假”和“秋假”的倒数"
    options:
      - "true"
      - "false"
    default_value: "true"
    
  SPRING_BREAK_DATE:
    name: 🌸 春假自定义日期
    description: "格式 MM/DD。留空则默认使用系统内置的推算逻辑"
    default_value: ""
    
  AUTUMN_BREAK_DATE:
    name: 🍂 秋假自定义日期
    description: "格式 MM/DD。留空则默认使用系统内置的推算逻辑"
    default_value: ""

  # ==================================
  # ⛽ 全国油价：查询偏好设置
  # ==================================
  GAS_REGION:
    name: 📍 油价查询地区
    description: "油价查询地区的拼音路径。格式如：sichuan/chengdu 或 beijing"
    default_value: "sichuan/chengdu"
    
  SHOW_TREND:
    name: 📈 显示调价趋势
    description: "是否在面板底部显示本轮调价的涨跌趋势及预测金额"
    options:
      - "true"
      - "false"
    default_value: "true"

# ==================================
# ⚙️ 脚本挂载配置
# ==================================
scriptings:
  - generic:
      name: 岁时黄历
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.js
  - generic:
      name: 时光倒数
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.js
  - generic:
      name: 网络信息
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/NetworkInfo.js
  - generic:
      name: 全国油价
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/GasPrice.js

# ==================================
# 📱 小组件实例化
# ==================================
widgets:
  - name: 岁时黄历
    script_name: 岁时黄历
  - name: 时光倒数
    script_name: 时光倒数
  - name: 网络信息
    script_name: 网络信息
  - name: 全国油价
    script_name: 全国油价
