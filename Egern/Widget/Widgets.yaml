# ==========================================
# 📌 模块名称: Egern 桌面小组件合集
# ✨ 特色功能: 集成岁时黄历、时光倒数、网络信息、全国油价 4 款像素级对齐的新中式桌面小组件；支持图形化配置多达 6 个专属纪念日、节假日强制置顶及油价查询地区；一键极速安装，全系完美适配 iOS 深浅模式。
# 🔗 引用链接: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Widgets.yaml
# ⏱️ 更新时间: 2026.03.17 16:48
# ==========================================

name: "Egern 小组件合集"
description: "包含：岁时黄历、时光倒数、网络信息、全国油价 4 款像素级对齐的桌面小组件。"

env_schema:
  # ==================================
  # ⏳ 时光倒数：专属纪念日设置
  # ==================================
  EXCLUSIVE_NAME_1:
    name: 🎁 专属纪念日 1
    description: "例如：我的生日、结婚纪念日"
    default_value: "我的生日"
  EXCLUSIVE_DATE_1:
    name: 📅 纪念日 1 日期
    description: "格式必须为 MM/DD，例如：12/13"
    default_value: "12/13"
    
  EXCLUSIVE_NAME_2:
    name: 🎁 专属纪念日 2
    description: "留空则不显示"
  EXCLUSIVE_DATE_2:
    name: 📅 纪念日 2 日期
    description: "格式必须为 MM/DD"
    
  EXCLUSIVE_NAME_3:
    name: 🎁 专属纪念日 3
    description: "留空则不显示"
  EXCLUSIVE_DATE_3:
    name: 📅 纪念日 3 日期
    description: "格式必须为 MM/DD"
    
  EXCLUSIVE_NAME_4:
    name: 🎁 专属纪念日 4
    description: "留空则不显示"
  EXCLUSIVE_DATE_4:
    name: 📅 纪念日 4 日期
    description: "格式必须为 MM/DD"
    
  EXCLUSIVE_NAME_5:
    name: 🎁 专属纪念日 5
    description: "留空则不显示"
  EXCLUSIVE_DATE_5:
    name: 📅 纪念日 5 日期
    description: "格式必须为 MM/DD"
    
  EXCLUSIVE_NAME_6:
    name: 🎁 专属纪念日 6
    description: "留空则不显示"
  EXCLUSIVE_DATE_6:
    name: 📅 纪念日 6 日期
    description: "格式必须为 MM/DD"

  # ==================================
  # ⏳ 时光倒数：进阶偏好设置
  # ==================================
  PINNED_HOLIDAY:
    name: ✨ 始终置顶节假日
    description: "输入你想高亮置顶在右上角的节日名称（如：高考、春节）。留空则关闭置顶。"
    default_value: ""
    
  SHOW_SCHOOL_HOLIDAYS:
    name: 🏫 显示春假和秋假
    description: "是否在法定节假日列表中显示春假和秋假"
    options:
      - "true"
      - "false"
    default_value: "true"
    
  SPRING_BREAK_DATE:
    name: 🌸 春假自定义日期
    description: "格式 MM/DD，留空则默认使用系统内置计算逻辑"
    default_value: ""
    
  AUTUMN_BREAK_DATE:
    name: 🍂 秋假自定义日期
    description: "格式 MM/DD，留空则默认使用系统内置计算逻辑"
    default_value: ""

  # ==================================
  # ⛽ 全国油价：查询偏好设置
  # ==================================
  GAS_REGION:
    name: 📍 油价查询地区
    description: "全国油价小组件的查询地区拼音，例如：sichuan/chengdu 或 beijing"
    default_value: "sichuan/chengdu"
    
  SHOW_TREND:
    name: 📈 显示调价趋势
    description: "是否显示底部本轮调价涨跌趋势及预测信息"
    options:
      - "true"
      - "false"
    default_value: "true"


scriptings:
  - generic:
      name: 岁时黄历
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Almanac.js
  - generic:
      name: 时光倒数
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/Countdown.js
  - generic:
      name: 网络信息
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/NetworkInfo.js
  - generic:
      name: 全国油价
      script_url: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Egern/Widget/GasPrice.js


widgets:
  - name: 岁时黄历
    script_name: 岁时黄历
  - name: 时光倒数
    script_name: 时光倒数
  - name: 网络信息
    script_name: 网络信息
  - name: 全国油价
    script_name: 全国油价
