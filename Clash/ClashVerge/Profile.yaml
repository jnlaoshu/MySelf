# > Clash Verge Rev@laoshu 自用配置
# > https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Clash/ClashVerge/Profile.yaml
# > Update: 2026.03.18 16:20

# --- 基础参数 ---
mode: rule
ipv6: true              # 必须开启，否则无法连接 IPv6 站点
log-level: info         # info 级别足够排查问题，warning 可能漏掉关键信息
allow-lan: true
mixed-port: 7893        # 混合端口，Verge Rev 会自动处理系统代理
bind-address: '*'
find-process-mode: strict # strict 模式在 Windows/Linux 下对游戏/应用分流更精准
global-client-fingerprint: chrome

# --- 性能优化 ---
keep-alive-interval: 15
keep-alive-idle: 600
tcp-concurrent: true     # 开启 TCP 并发，加速握手
unified-delay: true      # 去除握手延迟，测速更真实

# --- 外部资源 (使用 MetaCubeX 官方 CDN，速度更快) ---
profile:
  store-selected: true
  store-fake-ip: true
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# --- 关键：嗅探器 (Sniffer) ---
# 解决透明代理下域名识别问题，Verge Rev 强力推荐开启
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true # 流量重定向，防止 DNS 劫持
  force-dns-mapping: true    # 强制将嗅探到的域名映射回 Fake-IP
  sniff:
    HTTP: { ports: [80, 8080-8880] }
    TLS: { ports: [443, 8443] }
    QUIC: { ports: [443, 8443] }

# --- Tun 模式 (无感代理核心) ---
tun:
  enable: true
  stack: mixed            # 兼容性最好，若有断流可尝试 gvisor
  auto-route: true
  auto-redirect: true     # 自动重定向流量
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"

# --- DNS 设置 (核心重构：分流与防泄漏) ---
dns:
  enable: true
  ipv6: true            # 允许 DNS 解析 IPv6 地址
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  prefer-h3: true       # 开启 DoH 的 HTTP/3 支持，查询更快
  
  # 【新增】默认 DNS：用于解析下方加密 DNS 的域名，防止死循环
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  
  # 1. 默认 DNS (解析国外域名，使用加密 DNS)
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  
  # 2. 备用 DNS (国外)
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  
  # 3. 指定分流 (国内域名走国内 DNS，BYR 走国内 DNS)
  nameserver-policy:
    "geosite:cn,private": 
      - https://223.5.5.5/dns-query
      - https://1.12.12.12/dns-query
    # 针对性修复：byr.pt 必须使用国内/直连 DNS 解析，确保拿到 AAAA 记录
    "byr.pt": 
      - https://223.5.5.5/dns-query

  # 4. Fake-IP 过滤 (解决 PT 红种和 IPv6 连接问题)
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "stun.*"
    - "time.*.com"
    - "ntp.*.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.byr.pt"          # 关键：BYR 不走 Fake-IP
    - "+.edu.cn"         # 建议：教育网域名直连

# --- 锚点参数 ---
p: &p {type: http, interval: 86400, health-check: {enable: true, url: https://www.google.com/generate_204, interval: 300, timeout: 5000}}
pg: &pg {type: select, proxies: [Proxy, 香港节点, 美国节点, 狮城节点, 日本节点, 台湾节点, 韩国节点, DIRECT]}
url-test: &url-test {type: url-test, url: https://www.google.com/generate_204, interval: 300, tolerance: 50, include-all: true}
c: &c {type: http, behavior: classical, format: yaml, interval: 86400} # 格式改为 yaml 更稳健

# --- 代理提供商 ---
proxy-providers:
  Subscribe:
    url: http://127.0.0.1:38324/download/collection/AllServer
    <<: *p

# --- 策略组 (保持原样，逻辑清晰) ---
proxy-groups:
  - {name: 香港节点, <<: *url-test, filter: "(?i)🇭🇰|香港|(\b(HK|Hong|HKG)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HongKong.png}
  - {name: 美国节点, <<: *url-test, filter: "(?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States|American|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/UnitedStates.png}
  - {name: 狮城节点, <<: *url-test, filter: "(?i)🇸🇬|新加坡|狮|(\b(SG|Singapore|SIN|XSP)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Singapore.png}
  - {name: 日本节点, <<: *url-test, filter: "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan|NRT|HND|KIX|CTS|FUK)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Japan.png}
  - {name: 台湾节点, <<: *url-test, filter: "(?i)🇹🇼|🇹🇼|台湾|(\b(TW|Tai|TPE|Taiwan|TSA|KHH)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Taiwan.png}
  - {name: 韩国节点, <<: *url-test, filter: "(?i)🇰🇷|韩国|韓|首尔|南朝鲜|(\b(KR|KOR|Korea|South)\b)", icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png}
  - {name: Proxy, type: select, include-all: true, proxies: [香港节点, 美国节点, 狮城节点, 日本节点, 台湾节点, 韩国节点, DIRECT], icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Proxy.png}
  
  # 应用分组
  - {name: AIGC, <<: *pg, icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/ChatGPT.png}
  - {name: Apple, <<: *pg, icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Apple.png}
