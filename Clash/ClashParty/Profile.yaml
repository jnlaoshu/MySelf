# > 名称: Clash Party@laoshu 自用配置
# > 功能: 六地区节点自动优选分流 · 大厂域名专属 DoH · 四层广告拦截 · AIGC/Apple 双轨路由 · TUN 透明代理 · Smart Core 就绪
# > 引用: https://raw.githubusercontent.com/jnlaoshu/MySelf/master/Clash/ClashParty/Profile.yaml
# > 更新: 2026.03.23 20:33

# ── 锚点 ─────────────────────────────────────────────────────────────
p: &p
  type: http
  interval: 86400
  timeout: 15
  health-check:
    enable: true
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 5000

pg_auto: &pg_auto
  type: url-test
  lazy: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 3000
  tolerance: 50
  max-failed-times: 3
  include-all: true

c: &c {type: http, behavior: classical, format: yaml, interval: 86400}

# ── 订阅节点 ─────────────────────────────────────────────────────────
proxy-providers:
  Subscribe:
    url: http://127.0.0.1:38324/download/collection/AllServer
    <<: *p

# ── 基础参数 ─────────────────────────────────────────────────────────
mode: rule
mixed-port: 7893
port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: strict
global-client-fingerprint: chrome

# ── 性能参数 ─────────────────────────────────────────────────────────
keep-alive-interval: 15
keep-alive-idle: 600
skip-auth-prefixes:
  - 127.0.0.1/32
  - ::1/128
profile:
  store-selected: true
  store-fake-ip: true

# ── 嗅探器 ───────────────────────────────────────────────────────────
sniffer:
  enable: true
  override-destination: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:  {ports: [80, 8080-8880]}
    TLS:   {ports: [443, 8443]}
    QUIC:  {ports: [443, 8443]}

# ── TUN 模式 ─────────────────────────────────────────────────────────
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"

# ── DNS ──────────────────────────────────────────────────────────────
dns:
  enable: true
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    "geosite:alibaba":   https://dns.alidns.com/dns-query
    "geosite:tencent":   https://doh.pub/dns-query
    "geosite:bytedance": [180.184.1.1, 180.184.2.2]
    "geosite:cn":        [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.ntp.org
    - router.asus.com
    - +.miwifi.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    - time.windows.com
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    - localhost.work.weixin.qq.com
    - +.weixin.qq.com
    - +.wechat.com

# ── GeoData ──────────────────────────────────────────────────────────
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true
geox-url:
  geoip:   "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb:    "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn:     "https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb"

# ── 策略组 ───────────────────────────────────────────────────────────
proxy-groups:

  - name: 香港节点
    <<: *pg_auto
    filter: "(?i)🇭🇰|香港|\bHKG?\b|Hong"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/HongKong.png

  - name: 美国节点
    <<: *pg_auto
    filter: "(?i)🇺🇸|美国|\bUSA?\b|洛杉矶|硅谷|西雅图|芝加哥|达拉斯|凤凰城|阿什本|\b(LAX|SJC|SFO|SEA|ORD|JFK|DFW|IAD|PHX)\b"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/UnitedStates.png

  - name: 狮城节点
    <<: *pg_auto
    filter: "(?i)🇸🇬|新加坡|\bSGP?\b|Singapore|\bSIN\b"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Singapore.png

  - name: 日本节点
    <<: *pg_auto
    filter: "(?i)🇯🇵|日本|东京|大阪|\bJPN?\b|Japan|\b(NRT|HND|KIX|FUK)\b"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Japan.png

  - name: 台湾节点
    <<: *pg_auto
    filter: "(?i)🇹🇼|台湾|\bTW\b|Taiwan|\bTPE\b"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Taiwan.png

  - name: 韩国节点
    <<: *pg_auto
    filter: "(?i)🇰🇷|韩国|韩|首尔|\bKR\b|\bKOR\b|Korea|\bICN\b"
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Korea.png

  - name: Proxy
    type: select
    include-all: true
    proxies: [香港节点, 美国节点, 狮城节点, 日本节点, 台湾节点, 韩国节点, DIRECT]
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Proxy.png

  - name: AIGC
    type: select
    proxies: [美国节点, Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/ChatGPT.png

  - name: Bing
    type: select
    proxies: [美国节点, Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Bing.png

  - name: Apple
    type: select
    proxies: [DIRECT, Proxy]
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Apple.png

  - name: Disney
    type: select
    proxies: [狮城节点, Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/jnlaoshu/MySelf/main/image/Disney.png

  - name: Github
    type: select
