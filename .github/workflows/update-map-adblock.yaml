name: 自动更新地图去广告规则

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 确认 bdmap.ads.js 可用地址
        id: bdmap_url
        run: |
          GH="https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js"
          FB="https://ddgksf2013.top/scripts/bdmap.ads.js"
          if curl -fsS --max-time 10 "$GH" -o /dev/null 2>/dev/null; then
            echo "url=$GH" >> "$GITHUB_OUTPUT"
          else
            echo "url=$FB" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成 Egern 模块文件
        env:
          BDMAP_JS: ${{ steps.bdmap_url.outputs.url }}
        run: python3 Script/generate_map_modules.py

      - name: 提交并推送更新
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Egern/Module/AmapAdBlock.yaml \
                  Egern/Module/BaiduMapAdBlock.yaml \
                  Egern/Module/MapAdBlock.yaml
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 更新地图去广告模块 ${TODAY}"
            git push
          fi
