name: Update Map Ad-Block Modules

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）自动检查
    - cron: "0 2 * * *"
  workflow_dispatch:
    # 允许在网页上手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 运行生成器（传入 token 解除 API 限速）
      - name: Generate modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_map_modules.py

      # 4. 检查模块文件是否有变化
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet Egern/Module/ \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      # 5. 有变化才提交推送
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Egern/Module/AmapAdBlock.yaml
          git add Egern/Module/BaiduMapAdBlock.yaml
          git add Egern/Module/MapAdBlock.yaml
          git add scripts/.upstream_hashes.json || true
          git commit -F /tmp/commit_msg.txt
          git push

      # 6. 无变化时打印提示
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "上游无变化，跳过提交。"

      # 7. 脚本失效时自动创建 Issue 提醒你
      - name: Create issue on script failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[自动告警] 上游脚本不可访问 ${new Date().toISOString().slice(0,10)}`;
            const body = [
              "Actions 运行失败，以下脚本可能已失效，请手动确认：",
              "",
              "- https://raw.githubusercontent.com/ddgksf2013/Scripts/master/amap.js",
              "- https://raw.githubusercontent.com/ddgksf2013/Scripts/master/bdmap.ads.js",
              "",
              `[查看本次运行日志](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join("\n");

            // 检查是否已存在未关闭的同类 Issue，避免重复创建
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: "open",
              labels: "bug"
            });
            const exists = issues.some(i => i.title.includes("上游脚本不可访问"));
            if (!exists) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ["bug"]
              });
              console.log("Issue 已创建");
            } else {
              console.log("同类 Issue 已存在，跳过创建");
            }
